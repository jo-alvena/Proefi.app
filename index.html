/** =========================

function $(id){ return document.getElementById(id); }
function nowMs(){ return Date.now(); }
function safe(v){ return (v===undefined || v===null) ? "" : String(v); }
function cleanPhone(raw){ return String(raw || "").replace(/\D/g,''); }

function escapeHtml(str){
  return String(str || "")
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;")
    .replaceAll('"',"&quot;")
    .replaceAll("'","&#039;");
}

function dayKey(ts){
  const d = new Date(ts);
  const y = d.getFullYear();
  const m = String(d.getMonth()+1).padStart(2,'0');
  const da = String(d.getDate()).padStart(2,'0');
  return `${y}-${m}-${da}`;
}
function dayStartMs(ts){
  const d = new Date(ts);
  d.setHours(0,0,0,0);
  return d.getTime();
}
function dayEndMs(ts){
  const d = new Date(ts);
  d.setHours(23,59,59,999);
  return d.getTime();
}
function toISODateInput(ts){
  const d = new Date(ts);
  const y = d.getFullYear();
  const m = String(d.getMonth()+1).padStart(2,'0');
  const da = String(d.getDate()).padStart(2,'0');
  return `${y}-${m}-${da}`;
}
function parseISODateInput(val){
  if(!val) return null;
  const [y,m,d] = val.split("-").map(Number);
  const dt = new Date(y, m-1, d, 12, 0, 0, 0);
  return dt.getTime();
}

function templateMessage(msg, lead){
  const nome = lead?.nome || "";
  const tel  = lead?.telefone || "";
  const em   = lead?.email || "";
  return String(msg || "")
    .replaceAll("{{nome}}", nome)
    .replaceAll("{{telefone}}", tel)
    .replaceAll("{{email}}", em);
}

async function getUserDoc(uid){
  const snap = await db.collection("users").doc(uid).get();
  return snap.exists ? snap.data() : null;
}

function isMasterDirectorEmail(email){
  return String(email || "").toLowerCase() === MASTER_DIRECTOR_EMAIL.toLowerCase();
}

function activeBadge(ativo){

  return `<span class="pill" style="background:rgba(255,204,203,0.7)">PAUSADO</span>`;
}

/** Simple money sound */
function playCash(){
  if(!state.soundOn) return;
  try{
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const o = ctx.createOscillator();
    const g = ctx.createGain();
    o.type = "triangle";
    o.frequency.setValueAtTime(520, ctx.currentTime);
    o.frequency.exponentialRampToValueAtTime(820, ctx.currentTime + 0.08);
    g.gain.setValueAtTime(0.0001, ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.2, ctx.currentTime + 0.01);
    g.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + 0.12);
    o.connect(g);
    g.connect(ctx.destination);
    o.start();
    o.stop(ctx.currentTime + 0.13);
    setTimeout(()=>ctx.close(), 300);
  }catch(_){}
}

window.doSignup = async function(){
  const email = ($("email").value || "").trim();
  const senha = $("senha").value || "";
  const nome  = ($("nomeSignup").value || "").trim();
  const equipe = ($("equipeSignup").value || "").trim() || "equipe1";

    const cred = await auth.createUserWithEmailAndPassword(email, senha);
    const uid = cred.user.uid;

    const isMaster = isMasterDirectorEmail(email);

    await db.collection("users").doc(uid).set({

      role: isMaster ? "diretor" : role,
      aprovado: isMaster ? true : false,
      aprovadoEm: isMaster ? nowMs() : null,
      aprovadoPor: isMaster ? "MASTER" : null,

      ativo: false,
      ativoAtualizadoEm: nowMs(),
      mensagemPadrao: "Olá {{nome}}, aqui é da equipe Alvena. Estou tentando falar com você sobre seu interesse.",

      criadoEm: nowMs()

    if(String(e.code||"").includes("email-already-in-use")){
      alert("Este email já existe. Se estiver pendente, aguarde aprovação.");
    }else{
      alert(e.message || e.code);
    }
  }

function setTabsForRole(role){

    el.classList.toggle("navBtnActive", state.tab === id);

/** =========================
 *  Leads: Upload & Distribuição
 *  ========================= */
function parseSheetRows(workbook){
  const sheetName = workbook.SheetNames[0];
  const ws = workbook.Sheets[sheetName];
  const rows = XLSX.utils.sheet_to_json(ws, { header: 1, raw: false, defval: "" });
  const clean = rows.filter(r => r && r.some(cell => String(cell).trim() !== ""));
  return clean;
}

function detectHeaderRow(rows){
  const keys = ["nome","telefone","celular","contato","email","e-mail"];
  for(let i=0;i<Math.min(6, rows.length);i++){
    const row = rows[i].map(c=>String(c).toLowerCase().trim());
    if(row.some(c => keys.includes(c))) return i;
  }
  return 0;
}

function mapLeadColumns(row){
  const nome = String(row[0] || "").trim();
  const telefone = String(row[1] || "").trim();
  const email = String(row[2] || "").trim();
  return { nome, telefone, email };
}

function makeLeadDoc(base){
  return {
    nome: base.nome || "",
    telefone: base.telefone || "",
    email: base.email || "",
    status: "fila",
    corretorId: null,
    criadoEm: nowMs(),
    atualizadoEm: nowMs(),
    emAtendimentoEm: null,
    timestampDistribuicao: null,
    timestampFinalizacao: null,
    atendeu: null,
    resultado: null,
    observacao: null,
    dataAgendada: null,
    totalTentativas: 0,

    origem: null,        // geral | gerente | corretor
    equipe: null,        // string
    donoUpload: null,    // uid
    listaRef: null       // id da lista
  };
}

async function uploadLeadsFromFile({ file, origem, equipe, donoUploadUid, distribuirGeralAgora }){
  const arrayBuffer = await file.arrayBuffer();
  const workbook = XLSX.read(arrayBuffer, { type: "array" });
  const rows = parseSheetRows(workbook);
  if(rows.length === 0) throw new Error("Planilha vazia.");

  const headerIndex = detectHeaderRow(rows);
  const dataRows = rows.slice(headerIndex + 1);

  const parsed = [];
  for(const r of dataRows){
    const lead = mapLeadColumns(r);
    if(!lead.nome && !lead.telefone && !lead.email) continue;
    if(!lead.telefone) continue;
    parsed.push(lead);
  }
  if(parsed.length === 0) throw new Error("Nenhum lead válido (verifique colunas A/B/C).");

  const listaDoc = await db.collection("listas").add({
    origem,
    equipe: equipe || null,
    donoUpload: donoUploadUid,
    arquivoNome: file.name,
    total: parsed.length,
    criadoEm: nowMs()
  });
  const listaRefId = listaDoc.id;

  let corretoresAtivos = [];
  if(origem === "geral" && distribuirGeralAgora){
    const snap = await db.collection("users")
      .where("role","==","corretor")
      .where("ativo","==",true)
      .where("aprovado","==",true)
      .get();
    corretoresAtivos = snap.docs.map(d => ({ uid: d.id, ...d.data() }));
    if(corretoresAtivos.length === 0){
      throw new Error("Nenhum corretor ATIVO no momento. Peça para os corretores clicarem 'ESTOU ATIVO' antes do upload da lista geral.");
    }
  }

  const batchSize = 400;
  let idx = 0;

  while(idx < parsed.length){
    const batch = db.batch();
    const slice = parsed.slice(idx, idx + batchSize);

    for(const leadBase of slice){
      const docRef = db.collection("leads").doc();
      const doc = makeLeadDoc(leadBase);

      doc.origem = origem;
      doc.equipe = equipe || null;
      doc.donoUpload = donoUploadUid;
      doc.listaRef = listaRefId;

      if(origem === "geral" && distribuirGeralAgora){
        const chosen = corretoresAtivos[Math.floor(Math.random() * corretoresAtivos.length)];
        doc.corretorId = chosen.uid;
        doc.status = "fila";
      }

      batch.set(docRef, doc);
    }

    await batch.commit();
    idx += batchSize;
  }

  return { total: parsed.length, listaRefId };
}

async function pickNextLeadForCorretor({ source, corretorUid, equipeCorretor }){
  let q = db.collection("leads").where("status","==","fila");

  if(source === "geral"){
    q = q.where("origem","==","geral").where("corretorId","==",corretorUid);
  }else if(source === "gerente"){
    q = q.where("origem","==","gerente").where("equipe","==",equipeCorretor).where("corretorId","==",null);
  }else{
    q = q.where("origem","==","corretor").where("donoUpload","==",corretorUid).where("corretorId","==",null);
  }

  const snap = await q.limit(1).get();
  if(snap.empty) return null;

  const docSnap = snap.docs[0];
  const ref = docSnap.ref;

  await ref.update({
    status: "em atendimento",
    corretorId: corretorUid,
    emAtendimentoEm: nowMs(),
    timestampDistribuicao: nowMs(),
    atualizadoEm: nowMs(),

/** =========================
 *  Relatórios e Rankings
 *  ========================= */
async function getLeadsByPeriod({startMs, endMs, filtros}){
  let q = db.collection("leads");

  if(filtros?.corretorId){
    q = q.where("corretorId","==",filtros.corretorId);
  }
  if(filtros?.equipe){
    q = q.where("equipe","==",filtros.equipe);
  }
  if(filtros?.origem){
    q = q.where("origem","==",filtros.origem);
  }

  const snap = await q.get();
  const arr = [];
  snap.forEach(ds=>{
    const d = ds.data();
    const t = d.timestampDistribuicao || d.timestampFinalizacao || d.atualizadoEm || d.criadoEm || 0;
    if(t >= startMs && t <= endMs){
      arr.push({ id: ds.id, ...d });
    }
  });
  return arr;
}

function computeStatsFromLeads(leads, startMs, endMs){
  let totalLigacoes = 0;
  let totalNaoAtendeu = 0;
  let totalAtendidos = 0;
  let agend = 0;
  let promessa = 0;

  for(const d of leads){
    if(d.timestampDistribuicao && d.timestampDistribuicao >= startMs && d.timestampDistribuicao <= endMs){
      totalLigacoes += 1;
      if(d.atendeu === false) totalNaoAtendeu += 1;
    }
    if(d.atendeu === true && d.timestampFinalizacao && d.timestampFinalizacao >= startMs && d.timestampFinalizacao <= endMs){
      totalAtendidos += 1;
      if(d.resultado === "AGENDAMENTO") agend += 1;
      if(d.resultado === "PROMESSA DOCUMENTAÇÃO") promessa += 1;
    }
  }

  return { totalLigacoes, totalNaoAtendeu, totalAtendidos, agend, promessa };
}

function scoreFromStats(st){
  return (st.agend * 3) + (st.promessa * 2) + Math.floor(st.totalAtendidos * 0.5);
}

async function computeTop5Empresa(startMs, endMs){
  const usersSnap = await db.collection("users").where("role","==","corretor").where("aprovado","==",true).get();
  const corretores = usersSnap.docs.map(d => ({ uid: d.id, ...d.data() }));

  const results = [];
  for(const c of corretores){
    const leads = await getLeadsByPeriod({ startMs, endMs, filtros: { corretorId: c.uid } });
    const st = computeStatsFromLeads(leads, startMs, endMs);
    results.push({
      corretor: c.nome || c.email || c.uid,
      email: c.email || "",
      equipe: c.equipe || "",
      score: scoreFromStats(st),
      ...st
    });
  }

  results.sort((a,b)=> b.score - a.score);
  return results.slice(0,5);
}

async function computeTop5Equipe(equipe, startMs, endMs){
  const usersSnap = await db.collection("users")
    .where("role","==","corretor")
    .where("aprovado","==",true)
    .where("equipe","==",equipe)
    .get();

  const corretores = usersSnap.docs.map(d => ({ uid: d.id, ...d.data() }));
  const results = [];
  for(const c of corretores){
    const leads = await getLeadsByPeriod({ startMs, endMs, filtros: { corretorId: c.uid } });
    const st = computeStatsFromLeads(leads, startMs, endMs);
    results.push({
      corretor: c.nome || c.email || c.uid,
      email: c.email || "",
      equipe: c.equipe || "",
      score: scoreFromStats(st),
      ...st
    });
  }
  results.sort((a,b)=> b.score - a.score);
  return results.slice(0,5);
}

 *  ========================= */
async function getMiniCrmForRole(role){
  const me = state.userDoc;
  const todayStart = dayStartMs(nowMs());
  const todayEnd = dayEndMs(nowMs());

  let q = db.collection("leads")
    .where("atendeu","==",true)
    .where("status","==","finalizado");

  const snap = await q.get();
  const all = snap.docs.map(d => ({id:d.id, ...d.data()}));

  const today = all.filter(l => (l.timestampFinalizacao||0) >= todayStart && (l.timestampFinalizacao||0) <= todayEnd);
  const important = today.filter(l => l.resultado === "AGENDAMENTO" || l.resultado === "PROMESSA DOCUMENTAÇÃO");

  if(role === "corretor"){
    return important.filter(l => l.corretorId === state.user.uid);
  }

  if(role === "gerente"){
    const equipe = me.equipe || "equipe1";
    return important.filter(l => l.equipe === equipe);
  }

  return important;
}

}

  if(!sel) return;
  state.leadSource = sel.value;
};

window.pegarProximoLead = async function(){
  const me = state.userDoc;
  if(me.role !== "corretor") return;

  if(!me.ativo){
    alert("Você está PAUSADO. Ative no Painel para atender.");
    return;
  }

  if(state.leadAtualRef){
    return alert("Você já está com um lead em atendimento. Finalize antes de pegar outro.");
  }

  const source = $("leadSource") ? $("leadSource").value : (state.leadSource || "geral");
  state.leadSource = source;

  const picked = await pickNextLeadForCorretor({
    source, corretorUid: state.user.uid, equipeCorretor: me.equipe || "equipe1"
  });

  if(!picked){
    alert("Sem leads disponíveis nessa fonte.");
    return;
  }

  state.leadAtualRef = picked.ref;
  state.leadAtualData = picked.data;
  state.detailsOpen = false;

  await renderLeadInArea();
};

async function renderLeadInArea(){
  const lead = state.leadAtualData;
  const area = $("leadArea");
  if(!area || !lead) return;

  const snap = await db.collection("users").doc(state.user.uid).get();
  const userAtual = snap.exists ? (snap.data() || {}) : {};
  const telClean = cleanPhone(lead.telefone);

  const msgBase  = userAtual.mensagemPadrao || "";
  const msgFinalRaw = templateMessage(msgBase, lead);
  const msgFinal = encodeURIComponent(msgFinalRaw);

  area.innerHTML = `
    <div><b>${escapeHtml(lead.nome || "Sem nome")}</b></div>
    <div class="small muted">${escapeHtml(lead.telefone || "")} • ${escapeHtml(lead.email || "")}</div>
    <div class="divider"></div>

    <div class="grid3">
      <a href="tel:${telClean}">
        <button class="btn btnBlue">📞 LIGAR</button>
      </a>

      <a href="sms:${telClean}?body=${msgFinal}">
        <button class="btn btnBlue">📩 SMS</button>
      </a>

      <a href="mailto:${encodeURIComponent(lead.email || "")}?subject=${encodeURIComponent("PROEFI - ALVENA")}&body=${msgFinal}">
        <button class="btn btnBlue">📧 EMAIL</button>
      </a>
    </div>

    <a href="https://wa.me/55${telClean}?text=${msgFinal}" target="_blank">
      <button class="btn btnBlue" style="margin-top:10px">💬 WHATSAPP</button>
    </a>

    <div class="divider"></div>

    <div class="grid2">
      <button class="btn btnGreen" onclick="uiAtendeu()">ATENDEU</button>
      <button class="btn btnRed" onclick="uiNaoAtendeu()">NÃO ATENDEU</button>
    </div>

    <div id="atendeuBox"></div>
  `;
}

window.uiNaoAtendeu = async function(){
  if(!state.leadAtualRef) return;

  await state.leadAtualRef.update({
    status: "fila",
    corretorId: (state.leadAtualData.origem === "geral") ? state.user.uid : null,
    emAtendimentoEm: null,
    timestampDistribuicao: null,
    timestampFinalizacao: null,
    atendeu: false,
    resultado: null,
    observacao: null,
    dataAgendada: null,
    atualizadoEm: nowMs()
  });

  // solta lead atual e pega outro automaticamente
  state.leadAtualRef = null;
  state.leadAtualData = null;
  state.detailsOpen = false;

  $("leadArea").innerHTML = `<div class="center muted">Lead devolvido para a fila. Pegando outro...</div>`;

  setTimeout(async ()=>{
    await pegarProximoLead();
  }, 300);
};

window.uiAtendeu = function(){
  if(!state.leadAtualRef) return;
  if(state.detailsOpen) return;
  state.detailsOpen = true;

  $("atendeuBox").innerHTML = `
    <div class="divider"></div>
    <div><b>Finalize o atendimento</b></div>
    <div class="small muted">Clique em uma opção para abrir/fechar. Depois confirme.</div>
    <div class="divider"></div>

    <div class="toggleRow">
      <div class="toggleBtn" id="togAg" onclick="toggleFinal('ag')">📅 AGENDAMENTO</div>
      <div class="toggleBtn" id="togPr" onclick="toggleFinal('pr')">PROMESSA</div>
      <div class="toggleBtn" id="togSi" onclick="toggleFinal('si')">SEM INTERESSE</div>
    </div>

    <div id="finalArea" style="margin-top:10px"></div>
  `;
};

let finalMode = null;
let finalDraft = { data:null, hora:null, obs:"" };

window.toggleFinal = function(mode){
  const area = $("finalArea");
  if(!area) return;

  // se clicar no mesmo, fecha
  if(finalMode === mode){
    finalMode = null;
    ["togAg","togPr","togSi"].forEach(id=>$(id)?.classList.remove("toggleBtnOn"));
    area.innerHTML = "";
    return;
  }

  finalMode = mode;
  ["togAg","togPr","togSi"].forEach(id=>$(id)?.classList.remove("toggleBtnOn"));
  if(mode==="ag") $("togAg").classList.add("toggleBtnOn");
  if(mode==="pr") $("togPr").classList.add("toggleBtnOn");
  if(mode==="si") $("togSi").classList.add("toggleBtnOn");

  if(mode === "ag"){
    area.innerHTML = `
      <div class="fieldLabel">Data e horário (obrigatório)</div>
      <div class="grid2">
        <input type="date" id="agData"/>
        <input type="time" id="agHora"/>
      </div>
      <div class="fieldLabel">Observações (opcional)</div>
      <textarea id="agObs" placeholder="Ex: visita amanhã..."></textarea>
      <div class="divider"></div>
      <div class="grid2">
        <button class="btn btnGhost" onclick="cancelFinal()">Cancelar</button>
        <button class="btn btnGreen" onclick="confirmFinal()">Confirmar</button>
      </div>
    `;
  }

  if(mode === "pr"){
    area.innerHTML = `
      <div class="fieldLabel">Observações (opcional)</div>
      <textarea id="prObs" placeholder="Ex: vai enviar docs amanhã..."></textarea>
      <div class="divider"></div>
      <div class="grid2">
        <button class="btn btnGhost" onclick="cancelFinal()">Cancelar</button>
        <button class="btn btnGreen" onclick="confirmFinal()">Confirmar</button>
      </div>
    `;
  }

  if(mode === "si"){
    area.innerHTML = `
      <div class="fieldLabel">Feedback (obrigatório)</div>
      <textarea id="siObs" placeholder="Motivo / objeção / próximo passo..."></textarea>
      <div class="divider"></div>
      <div class="grid2">
        <button class="btn btnGhost" onclick="cancelFinal()">Cancelar</button>
        <button class="btn btnGreen" onclick="confirmFinal()">Confirmar</button>
      </div>
    `;
  }
};

window.cancelFinal = function(){
  // apenas fecha
  finalMode = null;
  ["togAg","togPr","togSi"].forEach(id=>$(id)?.classList.remove("toggleBtnOn"));
  const area = $("finalArea");
  if(area) area.innerHTML = "";
};

window.confirmFinal = async function(){
  if(!state.leadAtualRef) return;
  if(!finalMode) return alert("Selecione uma opção (Agendamento/Promessa/Sem interesse).");

  let resultado = "";
  let obs = null;
  let dataAgendada = null;

  if(finalMode === "ag"){
    const d = ($("agData").value || "").trim();
    const h = ($("agHora").value || "").trim();
    if(!d || !h) return alert("Preencha data e horário.");
    resultado = "AGENDAMENTO";
    dataAgendada = `${d} ${h}`;
    obs = ($("agObs").value || "").trim() || null;
  }

  if(finalMode === "pr"){
    resultado = "PROMESSA DOCUMENTAÇÃO";
    obs = ($("prObs").value || "").trim() || null;
  }

  if(finalMode === "si"){
    resultado = "NÃO GEROU INTERESSE";
    obs = ($("siObs").value || "").trim();
    if(!obs) return alert("Feedback é obrigatório.");
  }

  // confirmação final
  if(!confirm(`Confirmar: ${resultado}?`)) return;

  await state.leadAtualRef.update({
    status: "finalizado",
    atendeu: true,
    resultado,
    observacao: obs,
    dataAgendada: dataAgendada,
    timestampFinalizacao: nowMs(),
    atualizadoEm: nowMs()
  });

  if(resultado === "AGENDAMENTO" || resultado === "PROMESSA DOCUMENTAÇÃO"){
    playCash();
  }

  state.leadAtualRef = null;
  state.leadAtualData = null;
  state.detailsOpen = false;
  finalMode = null;

  $("leadArea").innerHTML = `<div class="center ok">Atendimento finalizado! Pegando outro...</div>`;

  setTimeout(async ()=>{
    await pegarProximoLead();
  }, 350);
};

/** =========================
 *  Resultados Actions
 *  ========================= */
window.toggleSound = function(){
  state.soundOn = !state.soundOn;
  const el = $("soundLabel");
  if(el) el.textContent = state.soundOn ? "ON" : "OFF";
};

window.calcResultados = async function(initial){
  const de = $("resDe")?.value;
  const ate = $("resAte")?.value;
  const startBase = parseISODateInput(de) || nowMs();
  const endBase = parseISODateInput(ate) || nowMs();

  const startMs = dayStartMs(startBase);
  const endMs = dayEndMs(endBase);

  const role = state.userDoc.role;
  const equipe = state.userDoc.equipe || "equipe1";

  const topEmpresa = await computeTop5Empresa(startMs, endMs);
  const topEquipe = await computeTop5Equipe(equipe, startMs, endMs);

  let areaHtml = "";
  areaHtml += renderTopTable("Top 5 • Empresa", topEmpresa);

  if(role !== "diretor"){
    areaHtml += renderTopTable("Top 5 • Sua Equipe", topEquipe);
  }else{
    areaHtml += renderTopTable("Top 5 • Equipe (referência: equipe1 do diretor)", topEquipe);
  }

  // KPIs do usuário
  if(role === "corretor"){
    const leads = await getLeadsByPeriod({startMs, endMs, filtros:{corretorId: state.user.uid}});
    const st = computeStatsFromLeads(leads, startMs, endMs);
    areaHtml += `
      <div class="card">
        <b>Seus números</b>
        <div class="divider"></div>
        <div class="kpiGrid">
          <div class="kpi"><b>Tentativas</b><div class="val">${st.totalLigacoes}</div></div>
          <div class="kpi"><b>Atendidos</b><div class="val">${st.totalAtendidos}</div></div>
          <div class="kpi"><b>Agendamentos</b><div class="val">${st.agend}</div></div>
          <div class="kpi"><b>Promessas</b><div class="val">${st.promessa}</div></div>
        </div>
      </div>
    `;
  }

  const area = $("resultArea");
  if(area) area.innerHTML = areaHtml;

  if(!initial){
    // nada
  }
};

window.baixarRelatorioExcel = async function(){
  const de = $("resDe")?.value;
  const ate = $("resAte")?.value;
  const startBase = parseISODateInput(de) || nowMs();
  const endBase = parseISODateInput(ate) || nowMs();
  const startMs = dayStartMs(startBase);
  const endMs = dayEndMs(endBase);

  const role = state.userDoc.role;
  const equipe = state.userDoc.equipe || "equipe1";

  let filtros = {};
  if(role === "corretor") filtros.corretorId = state.user.uid;
  if(role === "gerente") filtros.equipe = equipe;

  const leads = await getLeadsByPeriod({ startMs, endMs, filtros });
  const st = computeStatsFromLeads(leads, startMs, endMs);

  const resumo = [
    ["PROEFI - ALVENA", ""],
    ["Perfil", role],
    ["Usuário", state.user.email],
    ["Equipe", equipe],
    ["Período DE", de || ""],
    ["Período ATÉ", ate || ""],
    ["Total tentativas", st.totalLigacoes],
    ["Total não atendeu", st.totalNaoAtendeu],
    ["Total atendidos", st.totalAtendidos],
    ["Agendamentos", st.agend],
    ["Promessas", st.promessa],
    ["Gerado em", new Date().toLocaleString()]
  ];

  const atendidos = leads
    .filter(l => l.atendeu === true)
    .map(l => ({
      Cliente: l.nome || "",
      Telefone: l.telefone || "",
      Email: l.email || "",
      Resultado: l.resultado || "",
      "Data/Hora Agendada": l.dataAgendada || "",
      Feedback: l.observacao || "",
      "CorretorId": l.corretorId || "",
      "Equipe": l.equipe || "",
      "Finalizado em": l.timestampFinalizacao ? new Date(l.timestampFinalizacao).toLocaleString() : ""
    }));

  const wb = XLSX.utils.book_new();
  const wsResumo = XLSX.utils.aoa_to_sheet(resumo);
  const wsAtend = XLSX.utils.json_to_sheet(atendidos);

  XLSX.utils.book_append_sheet(wb, wsResumo, "Resumo");
  XLSX.utils.book_append_sheet(wb, wsAtend, "Atendidos");

  const fileName = `PROEFI_RELATORIO_${role}_${(de||"DE")}_A_${(ate||"ATE")}.xlsx`;
  XLSX.writeFile(wb, fileName);
  alert("Relatório gerado (baixado no dispositivo).");
};

/** =========================

window.approveAccess = async function(uid){
  if(!uid) return;
  await approveUser(uid);
  alert("Acesso aprovado!");
  await renderApp();
};
window.denyAccess = async function(uid){
  if(!uid) return;
  if(!confirm("Negar acesso? Isso removerá o usuário.")) return;
  await denyUser(uid);
  alert("Acesso negado/removido.");
  await renderApp();
};

window.abrirPainelAprovacoes = async function(){
  const arr = await fetchPendingUsersForApprover();
  const area = $("aprovacoesArea");
  if(!area) return;
  if(arr.length === 0){
    area.innerHTML = "Nenhum acesso pendente.";
    return;
  }
  area.innerHTML = `
    <div class="divider"></div>
    <div class="tableWrap">
      <table>
        <thead><tr><th>Nome</th><th>Email</th><th>Equipe</th><th>Role</th><th>Ação</th></tr></thead>
        <tbody>
          ${arr.map(p=>`
            <tr>
              <td>${escapeHtml(p.nome||"")}</td>
              <td>${escapeHtml(p.email||"")}</td>
              <td>${escapeHtml(p.equipe||"")}</td>
              <td>${escapeHtml(p.role||"")}</td>
              <td>
                <button class="btn btnGreen" style="padding:10px;border-radius:12px;font-size:13px" onclick="approveAccess('${p.id}')">Aprovar</button>
                <button class="btn btnRed" style="padding:10px;border-radius:12px;font-size:13px;margin-top:6px" onclick="denyAccess('${p.id}')">Negar</button>
              </td>
            </tr>
          `).join("")}
        </tbody>
      </table>
    </div>
  `;
};

/** =========================
 *  Main Render
 *  ========================= */
async function renderApp(){
  const me = state.userDoc;
  if(!me) return;

  setTabsForRole(me.role);

  // gerente/diretor não entram em "atend"
  if(me.role !== "corretor" && state.tab === "atend"){
    state.tab = "painel";
    updateNavActive();
  }

  if(state.tab === "painel") return renderPainel();
  if(state.tab === "atend")  return renderAtendimento();
  if(state.tab === "mini")   return renderMiniCrm();
  if(state.tab === "result") return renderResultados();
  if(state.tab === "config") return renderConfig();

  return renderPainel();
}

/** =========================
 *  Bootstrap
 *  ========================= */
auth.onAuthStateChanged(async (user)=>{
  state.user = user;

  if(!user){
    state.userDoc = null;
    state.tab = "painel";
    state.leadAtualRef = null;
    state.leadAtualData = null;
    state.detailsOpen = false;
    renderLogin();
    return;
  }

  // garante doc
  const userRef = db.collection("users").doc(user.uid);
  const snap = await userRef.get();
  if(!snap.exists){
    await userRef.set({
      email: user.email || "",
      nome: "",
      equipe: "equipe1",
      role: isMasterDirectorEmail(user.email) ? "diretor" : "corretor",
      aprovado: isMasterDirectorEmail(user.email),
      aprovadoEm: isMasterDirectorEmail(user.email) ? nowMs() : null,
      aprovadoPor: isMasterDirectorEmail(user.email) ? "MASTER" : null,
      ativo: false,
      ativoAtualizadoEm: nowMs(),
      mensagemPadrao: "Olá {{nome}}, aqui é da equipe Alvena. Estou tentando falar com você sobre seu interesse.",
      emailRelatorio: "",
      criadoEm: nowMs()
    });
  }

  state.userDoc = await getUserDoc(user.uid);

  // garante master director
  if(isMasterDirectorEmail(user.email)){
    if(state.userDoc.role !== "diretor" || state.userDoc.aprovado !== true){
      await userRef.update({ role:"diretor", aprovado:true, aprovadoEm: nowMs(), aprovadoPor:"MASTER" });
      state.userDoc = await getUserDoc(user.uid);
    }
  }

  // aprovado?
  if(!state.userDoc.aprovado){
    renderPendingApproval();
    return;
  }

  await renderApp();
});
</script>
