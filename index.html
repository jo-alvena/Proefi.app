<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PROEFI</title>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

<style>
body{
  margin:0;
  font-family: 'Century Gothic', Arial;
  background:#21346C;
  color:#FFFFFF;
  padding:20px;
}

h2{
  color:#BC8A0B;
  margin-bottom:5px;
}

.card{
  background:#FFFFFF;
  color:#21346C;
  padding:20px;
  border-radius:12px;
  margin-top:20px;
}

input, textarea{
  width:100%;
  padding:12px;
  margin-top:8px;
  margin-bottom:10px;
  border-radius:8px;
  border:1px solid #ccc;
  font-size:16px;
}

button{
  width:100%;
  padding:14px;
  margin-top:8px;
  border:none;
  border-radius:8px;
  font-size:16px;
  font-weight:bold;
}

.btn-primario{background:#BC8A0B;color:#FFFFFF;}
.btn-verde{background:#A5D6A7;color:#21346C;}
.btn-vermelho{background:#EF9A9A;color:#21346C;}
.btn-azul{background:#21346C;color:#FFFFFF;}
.btn-neutro{background:#BC8A0B;color:#FFFFFF;}

a{text-decoration:none;}
</style>
</head>
<body>

<div id="app">Carregando...</div>

<script>

const firebaseConfig = {
  apiKey: "AIzaSyAPO-xtmzg0QMvSoDfHd6nRcmrDb7F8n6k",
  authDomain: "proefi-alvena.firebaseapp.com",
  projectId: "proefi-alvena",
  storageBucket: "proefi-alvena.firebasestorage.app",
  messagingSenderId: "1084612497727",
  appId: "1:1084612497727:web:d9b1de2962cce8123b038a"
};

firebase.initializeApp(firebaseConfig);
const auth=firebase.auth();
const db=firebase.firestore();
const app=document.getElementById("app");

auth.onAuthStateChanged(async(user)=>{
  if(!user){mostrarLogin();return;}

  const doc=await db.collection("users").doc(user.uid).get();
  if(!doc.exists){app.innerHTML="Usuário não autorizado";return;}

  const role=doc.data().role;
  if(role==="gerente"){mostrarGerente(user.email);}
  else{mostrarCorretor(user.email);}
});

function mostrarLogin(){
  app.innerHTML=`
    <h2>PROEFI</h2>
    <input id="email" placeholder="Email">
    <input id="senha" type="password" placeholder="Senha">
    <button class="btn-primario" onclick="login()">ENTRAR</button>
  `;
}

function login(){
  const email=document.getElementById("email").value;
  const senha=document.getElementById("senha").value;
  auth.signInWithEmailAndPassword(email,senha)
  .catch(e=>alert(e.message));
}

function logout(){auth.signOut();}

function mostrarGerente(email){
  app.innerHTML=`
    <h2>PROEFI - GERENTE</h2>
    <p>${email}</p>
    <button class="btn-neutro" onclick="logout()">Sair</button>
  `;
}

function mostrarCorretor(email){
  app.innerHTML=`
    <h2>PROEFI - CORRETOR</h2>
    <p>${email}</p>
    <button class="btn-primario" onclick="pegarLead()">PEGAR PRÓXIMO LEAD</button>
    <div id="leadAtual"></div>
    <button class="btn-neutro" onclick="logout()">Sair</button>
  `;
}

window.pegarLead=async function(){
  const snapshot=await db.collection("leads")
  .where("status","==","fila").limit(1).get();

  if(snapshot.empty){alert("Sem leads disponíveis");return;}

  const doc=snapshot.docs[0];

  await db.collection("leads").doc(doc.id).update({
    status:"em_atendimento",
    corretorId:auth.currentUser.uid,
    timestampDistribuicao:Date.now()
  });

  mostrarLead(doc.id,doc.data());
}

function mostrarLead(id,data){

  const telefone=data.telefone.replace(/\D/g,'');
  const mensagem=encodeURIComponent(`Olá ${data.nome}, aqui é da equipe Alvena.`);

  document.getElementById("leadAtual").innerHTML=`
  <div class="card">
    <h3>${data.nome}</h3>
    <p><strong>Telefone:</strong> ${data.telefone}</p>
    <p><strong>Email:</strong> ${data.email}</p>

    <a href="tel:${telefone}"><button class="btn-azul">📞 LIGAR</button></a>
    <a href="https://wa.me/55${telefone}?text=${mensagem}" target="_blank">
      <button class="btn-azul">💬 WHATSAPP</button>
    </a>

    <textarea id="obs" placeholder="Observação"></textarea>

    <input type="datetime-local" id="dataHora" style="display:none;">

    <button class="btn-verde" onclick="finalizarLead('${id}','atendeu')">
      ATENDEU
    </button>

    <button class="btn-vermelho" onclick="finalizarLead('${id}','nao_atendeu')">
      NÃO ATENDEU
    </button>

    <button class="btn-primario" onclick="abrirAgendamento()">
      📅 AGENDAMENTO
    </button>

    <button class="btn-primario" onclick="finalizarLead('${id}','promessa_documentacao')">
      PROMESSA DE DOCUMENTAÇÃO
    </button>

    <p id="contador"></p>
  </div>
  `;

  iniciarTimer(id);
}

function abrirAgendamento(){
  document.getElementById("dataHora").style.display="block";
}

window.finalizarLead=async function(id,resultado){

  const observacao=document.getElementById("obs").value;
  const dataHora=document.getElementById("dataHora").value;

  if(resultado==="atendeu"||resultado==="nao_atendeu"){
    await salvar(id,resultado,observacao,null);
  }
  else if(resultado==="promessa_documentacao"){
    await salvar(id,resultado,observacao,null);
  }
}

async function salvar(id,resultado,obs,dataHora){
  await db.collection("leads").doc(id).update({
    status:"finalizado",
    resultado:resultado,
    observacao:obs,
    dataAgendada:dataHora||null
  });
  document.getElementById("leadAtual").innerHTML="";
}

function iniciarTimer(id){
  const tempoMaximo=20*60*1000;
  const inicio=Date.now();

  const intervalo=setInterval(async()=>{
    const restante=tempoMaximo-(Date.now()-inicio);
    if(restante<=0){
      clearInterval(intervalo);
      await db.collection("leads").doc(id).update({
        status:"fila",
        corretorId:"",
        timestampDistribuicao:0
      });
      document.getElementById("leadAtual").innerHTML="";
      alert("Tempo expirado. Lead voltou para fila.");
    }else{
      const m=Math.floor(restante/60000);
      const s=Math.floor((restante%60000)/1000);
      document.getElementById("contador").innerText=
      `Tempo restante: ${m}:${s.toString().padStart(2,'0')}`;
    }
  },1000);
}

</script>
</body>
</html>
