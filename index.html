<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>PROEFI</title>
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "SUA_API_KEY",
      authDomain: "proefi-alvena.firebaseapp.com",
      projectId: "proefi-alvena",
      storageBucket: "proefi-alvena.firebasestorage.app",
      messagingSenderId: "1084612497727",
      appId: "1:1084612497727:web:d9b1de2962cce8123b038a"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    onAuthStateChanged(auth, async (user) => {
      if (!user) {
        document.body.innerHTML = "<h2>Faça login primeiro.</h2>";
        return;
      }

      const userRef = doc(db, "users", user.uid);
      const userSnap = await getDoc(userRef);

      if (!userSnap.exists()) {
        document.body.innerHTML = "<h2>Usuário não autorizado.</h2>";
        return;
      }

      const dados = userSnap.data();

      if (dados.role === "gerente") {
        mostrarGerente(user.email);
      } else {
        mostrarCorretor(user.email);
      }
    });

    function mostrarGerente(email) {
      document.body.innerHTML = `
        <h1>PROEFI - GERENTE</h1>
        <p>${email}</p>
        <button onclick="logout()">Sair</button>
        <hr>
        <h3>Painel de Upload de Leads (em breve)</h3>
      `;
    }

    function mostrarCorretor(email) {
      document.body.innerHTML = `
        <h1>PROEFI - CORRETOR</h1>
        <p>${email}</p>
        <button onclick="logout()">Sair</button>
        <hr>
        <h3>Distribuição automática em breve</h3>
      `;
    }

    window.logout = function() {
      signOut(auth);
      location.reload();
    }
  </script>
</head>
<body>
  <h2>Carregando...</h2>
</body>
</html>
