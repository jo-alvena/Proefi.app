function dayKey(ts){
  const d = new Date(ts);
  const y = d.getFullYear();
  const m = String(d.getMonth()+1).padStart(2,'0');
  const da = String(d.getDate()).padStart(2,'0');
  return `${y}-${m}-${da}`;
}
function formatClock(ms){
  const s = Math.max(0, Math.floor(ms/1000));
  const hh = String(Math.floor(s/3600)).padStart(2,'0');
  const mm = String(Math.floor((s%3600)/60)).padStart(2,'0');
  const ss = String(s%60).padStart(2,'0');
  return `${hh}:${mm}:${ss}`;
}

  const nome = lead?.nome || "";

    .replaceAll("{{telefone}}", tel)

async function ensureFixedDirector(user){
  const email = String(user?.email || "").toLowerCase();
  if(email !== DIRETOR_EMAIL_FIXO) return;

  const ref = db.collection("users").doc(user.uid);
  const snap = await ref.get();

  const payload = {
    nome: "JÓ (Diretor)",
    email: user.email,
    role: "diretor",
    aprovado: true,
    isAdminAprovador: true,
    equipe: "DIRETORIA",
    atualizadoEm: nowMs(),
    solicitadoRole: "diretor",
    solicitadoEm: nowMs()
  };

  if(!snap.exists){
    payload.criadoEm = nowMs();
    payload.mensagemPadrao = "Olá {{nome}}, aqui é da equipe Alvena. Estou tentando falar com você sobre seu interesse.";
    payload.ativo = false;
    await ref.set(payload, { merge:true });
  }else{
    await ref.set(payload, { merge:true });
  }
}

/** =========================
 *  Pendente (criar acesso)
 *  ========================= */
async function ensurePendingUserDoc({ uid, email, nome, equipe, solicitadoRole }){
  const ref = db.collection("users").doc(uid);
  const snap = await ref.get();
  const base = snap.exists ? (snap.data() || {}) : {};

  if(base.aprovado === true && base.role && base.role !== "pendente"){
    return { status:"approved", data: base };
  }

  const payload = {
    nome: nome || base.nome || (email ? email.split("@")[0] : "Usuário"),
    email: email || base.email || "",
    equipe: equipe || base.equipe || "equipe1",
    role: "pendente",
    solicitadoRole: solicitadoRole || base.solicitadoRole || "corretor",
    aprovado: false,
    solicitadoEm: base.solicitadoEm || nowMs(),
    ativo: false,
    mensagemPadrao: base.mensagemPadrao || "Olá {{nome}}, aqui é da equipe Alvena. Estou tentando falar com você sobre seu interesse.",
    atualizadoEm: nowMs(),
    criadoEm: base.criadoEm || nowMs()
  };

  await ref.set(payload, { merge:true });
  return { status:"pending", data: payload };
}

/** =========================
 *  Upload XLS/XLSX/CSV
 *  ========================= */
function parseSheetRows(workbook){
  const sheetName = workbook.SheetNames[0];
  const ws = workbook.Sheets[sheetName];
  const rows = XLSX.utils.sheet_to_json(ws, { header: 1, raw: false, defval: "" });
  return rows.filter(r => r && r.some(cell => String(cell).trim() !== ""));
}
function detectHeaderRow(rows){
  const keys = ["nome","telefone","celular","contato","email","e-mail"];
  for(let i=0;i<Math.min(5, rows.length);i++){
    const row = rows[i].map(c=>String(c).toLowerCase().trim());
    if(row.some(c => keys.includes(c))) return i;
  }
  return 0;
}
function mapLeadColumns(row){
  return {
    nome: String(row[0] || "").trim(),
    telefone: String(row[1] || "").trim(),
    email: String(row[2] || "").trim()
  };
}
function makeLeadDoc(base){
  return {
    nome: base.nome || "",
    telefone: base.telefone || "",
    email: base.email || "",
    status: "fila",
    corretorId: null,
    criadoEm: nowMs(),
    atualizadoEm: nowMs(),
    emAtendimentoEm: null,
    timestampDistribuicao: null,
    timestampFinalizacao: null,
    atendeu: null,
    resultado: null,
    observacao: null,
    dataAgendada: null,
    totalTentativas: 0,
    origem: null,
    equipe: null,
    donoUpload: null,
    listaRef: null,
    ultimoNaoAtendeuPor: null,
    ultimoNaoAtendeuEm: null
  };
}
async function uploadLeadsFromFile({ file, origem, equipe, donoUploadUid, distribuirGeralAgora }){
  const arrayBuffer = await file.arrayBuffer();
  const workbook = XLSX.read(arrayBuffer, { type: "array" });
  const rows = parseSheetRows(workbook);
  if(rows.length === 0) throw new Error("Planilha vazia.");

  const headerIndex = detectHeaderRow(rows);
  const dataRows = rows.slice(headerIndex + 1);

  const parsed = [];
  for(const r of dataRows){
    const lead = mapLeadColumns(r);
    if(!lead.nome && !lead.telefone && !lead.email) continue;
    if(!lead.telefone) continue;
    parsed.push(lead);
  }
  if(parsed.length === 0) throw new Error("Nenhum lead válido (verifique colunas A/B/C).");

  const listaDoc = await db.collection("listas").add({
    origem,
    equipe: equipe || null,
    donoUpload: donoUploadUid,
    arquivoNome: file.name,
    total: parsed.length,
    criadoEm: nowMs()
  });
  const listaRefId = listaDoc.id;

  let corretoresAtivos = [];
  if(origem === "geral" && distribuirGeralAgora){
    const snap = await db.collection("users")
      .where("role","==","corretor")
      .where("ativo","==",true)
      .where("aprovado","==",true)
      .get();
    corretoresAtivos = snap.docs.map(d => ({ uid: d.id, ...d.data() }));
    if(corretoresAtivos.length === 0){
      throw new Error("Nenhum corretor ATIVO no momento. Peça para os corretores clicarem 'ESTOU ATIVO' antes do upload da lista geral.");
    }
  }

  const batchSize = 400;
  let idx = 0;

  while(idx < parsed.length){
    const batch = db.batch();
    const slice = parsed.slice(idx, idx + batchSize);

    for(const leadBase of slice){
      const docRef = db.collection("leads").doc();
      const doc = makeLeadDoc(leadBase);

      doc.origem = origem;
      doc.equipe = equipe || null;
      doc.donoUpload = donoUploadUid;
      doc.listaRef = listaRefId;

      if(origem === "geral" && distribuirGeralAgora){
        const chosen = corretoresAtivos[Math.floor(Math.random() * corretoresAtivos.length)];
        doc.corretorId = chosen.uid;
        doc.status = "fila";
      }
      batch.set(docRef, doc);
    }
    await batch.commit();
    idx += batchSize;
  }
  return { total: parsed.length, listaRefId };
}

/** =========================
 *  Stats diários
 *  ========================= */
async function bumpDailyStat(uid, equipe, email, patch){
  const dk = dayKey(nowMs());
  const docId = `${dk}_${uid}`;
  const ref = db.collection("stats_diarios").doc(docId);

  await db.runTransaction(async (tx)=>{
    const snap = await tx.get(ref);
    const base = snap.exists ? (snap.data() || {}) : {};
    const next = Object.assign({}, base);

    next.dateKey = dk;
    next.uid = uid;
    next.equipe = equipe || null;
    next.email = email || null;
    next.atualizadoEm = nowMs();
    if(!next.criadoEm) next.criadoEm = nowMs();

    for(const k of Object.keys(patch)){
      const add = Number(patch[k] || 0);
      next[k] = Number(next[k] || 0) + add;
      if(next[k] < 0) next[k] = 0;
    }
    tx.set(ref, next, { merge:true });
  });
}
function outcomeToStatKey(res){
  if(res === "AGENDAMENTO") return "agendamentos";
  if(res === "PROMESSA DOCUMENTAÇÃO") return "promessas";
  if(res === "NÃO GEROU INTERESSE") return "semInteresse";
  return null;
}

 *  Lead picking
 *  ========================= */
async function queryCandidatesForCorretor({ source, corretorUid, equipeCorretor }){
  let q = db.collection("leads").where("status","==","fila");

  if(source === "geral"){
    q = q.where("origem","==","geral").where("corretorId","==",corretorUid);
  }else if(source === "gerente"){
    q = q.where("origem","==","gerente").where("equipe","==",equipeCorretor).where("corretorId","==",null);
  }else{
    q = q.where("origem","==","corretor").where("donoUpload","==",corretorUid).where("corretorId","==",null);
  }
  const snap = await q.limit(PICK_LIMIT).get();
  return snap.docs;
}
function isBlockedByCooldown(doc){
  const d = doc.data() || {};
  if(!d.ultimoNaoAtendeuPor || !d.ultimoNaoAtendeuEm) return false;
  if(d.ultimoNaoAtendeuPor !== currentUser.uid) return false;
  const delta = nowMs() - Number(d.ultimoNaoAtendeuEm || 0);
  return delta < NAO_ATENDEU_COOLDOWN_MS;
}
async function pickNextLeadForCorretor({ source, corretorUid, equipeCorretor }){
  const candidates = await queryCandidatesForCorretor({ source, corretorUid, equipeCorretor });

  const filtered = candidates.filter(doc=>{
    if(lastLeadId && doc.id === lastLeadId) return false;
    if(isBlockedByCooldown(doc)) return false;
    return true;
  });
  if(filtered.length === 0) return null;

  const chosenDoc = filtered[Math.floor(Math.random() * filtered.length)];
  const ref = chosenDoc.ref;

  const claimed = await db.runTransaction(async (tx)=>{
    const snap = await tx.get(ref);
    if(!snap.exists) return null;
    const data = snap.data() || {};
    if(data.status !== "fila") return null;

    if(source === "geral"){
      if(data.origem !== "geral" || data.corretorId !== corretorUid) return null;
    }else if(source === "gerente"){
      if(data.origem !== "gerente" || (data.equipe || null) !== (equipeCorretor || null) || data.corretorId) return null;
    }else{
      if(data.origem !== "corretor" || data.donoUpload !== corretorUid || data.corretorId) return null;
    }

    tx.update(ref, {
      status: "em atendimento",
      corretorId: corretorUid,
      emAtendimentoEm: nowMs(),
      timestampDistribuicao: nowMs(),
      atualizadoEm: nowMs(),
      totalTentativas: firebase.firestore.FieldValue.increment(1)
    });
    return true;
  });

  if(!claimed) return null;
  const fresh = await ref.get();
  return { ref, data: fresh.data() };
}

  if(!openOutcome){

  let dataAgendada = null;

    obs = (draftObs || "").trim() || null;

    resultado = "NÃO GEROU INTERESSE";

    obs = fb;

  const equipe = currentUserData?.equipe || "equipe1";
  const leadId = leadAtualRef.id;

  await leadAtualRef.update({
    status: "finalizado",
    atendeu: true,
    resultado,

    dataAgendada: dataAgendada,
    timestampFinalizacao: nowMs(),
    atualizadoEm: nowMs()
  });

  else if(resultado === "PROMESSA DOCUMENTAÇÃO") patch.promessas = 1;

  await bumpDailyStat(currentUser.uid, equipe, currentUser.email, patch);

  openOutcome = null;

  draftAgHora = "";

/** =========================
 *  Corretor: Mini CRM Editável (somente AGENDAMENTO/PROMESSA)
 *  - Pode editar RESULTADO e OBS e DATA/HORA (agendamento)
 *  - Pode EXCLUIR
 *  - Ajusta stats_diarios do dia automaticamente
 *  ========================= */
async function hydrateMiniCrmEdit(){
  const el = $("miniCrmEdit");
  if(!el) return;

  const today = dayKey(nowMs());

  const snap = await db.collection("leads")
    .where("corretorId","==",currentUser.uid)
    .where("status","==","finalizado")
    .limit(150)
    .get();

  const rows = [];
  snap.forEach(ds=>{
    const d = ds.data() || {};
    if(d.timestampFinalizacao && dayKey(d.timestampFinalizacao) === today){
      if(d.resultado === "AGENDAMENTO" || d.resultado === "PROMESSA DOCUMENTAÇÃO"){
        rows.push({ id: ds.id, ...d });
      }
    }
  });

  rows.sort((a,b)=> (b.timestampFinalizacao||0) - (a.timestampFinalizacao||0));

  if(rows.length === 0){
    el.innerHTML = `<div class="muted">Nenhum AGENDAMENTO/PROMESSA hoje.</div>`;
    return;
  }

  el.innerHTML = rows.map((r, idx)=>`
    <div class="listItem">
      <div class="miniTop">
        <div>
          <div><b>${r.nome || "Sem nome"}</b></div>
          <div class="small muted">${r.telefone || ""}${r.email ? " • " + r.email : ""}</div>
        </div>
        <div class="tag">${r.resultado}</div>
      </div>

      <div class="divider"></div>

window.miniSalvar = async function(leadId){
  const ref = db.collection("leads").doc(leadId);
  const snap = await ref.get();
  if(!snap.exists) return alert("Lead não encontrado.");
  const old = snap.data() || {};

  // segurança: só o dono pode editar
  if(old.corretorId !== currentUser.uid) return alert("Sem permissão.");

  const newRes = ($("miniRes_"+leadId)?.value || "").trim();
  const newDataAg = ($("miniData_"+leadId)?.value || "").trim();
  const newObs = ($("miniObs_"+leadId)?.value || "").trim();

  // validação agendamento
  if(newRes === "AGENDAMENTO" && !newDataAg){
    return alert("Se for AGENDAMENTO, preencha Data/Hora.");
  }

  // atualizar lead
  await ref.update({
    resultado: newRes || null,
    dataAgendada: (newRes === "AGENDAMENTO") ? newDataAg : null,
    observacao: newObs || null,
    atualizadoEm: nowMs()
  });

  // ajustar stats do dia (apenas se for hoje)
  const today = dayKey(nowMs());
  const isHoje = old.timestampFinalizacao && dayKey(old.timestampFinalizacao) === today;

  if(isHoje){
    const equipe = currentUserData?.equipe || "equipe1";

    // se mudou resultado, ajusta contadores
    if(old.resultado !== newRes){
      const patch = {};

      const oldKey = outcomeToStatKey(old.resultado);
      const newKey = outcomeToStatKey(newRes);

      // sempre foi atendido (finalizado)
      // só muda categorias
      if(oldKey) patch[oldKey] = (patch[oldKey]||0) - 1;
      if(newKey) patch[newKey] = (patch[newKey]||0) + 1;

      await bumpDailyStat(currentUser.uid, equipe, currentUser.email, patch);
    }
  }

  alert("Salvo!");
  hydrateMiniCrmEdit();
  hydrateMiniCrmHoje();
  hydrateMyDayStats();
};

window.miniExcluir = async function(leadId){
  const ok = confirm("Excluir este lead do sistema? (Isso remove do Firestore e ajusta os números do dia)");
  if(!ok) return;

  const ref = db.collection("leads").doc(leadId);
  const snap = await ref.get();
  if(!snap.exists) return alert("Lead não encontrado.");
  const d = snap.data() || {};

  if(d.corretorId !== currentUser.uid) return alert("Sem permissão.");

  // ajustar stats do dia (se for hoje)
  const today = dayKey(nowMs());
  const isHoje = d.timestampFinalizacao && dayKey(d.timestampFinalizacao) === today;

  if(isHoje){
    const equipe = currentUserData?.equipe || "equipe1";
    const patch = {};

    // como ele era finalizado e atendido, diminui atendidos
    patch.atendidos = (patch.atendidos||0) - 1;

    const key = outcomeToStatKey(d.resultado);
    if(key) patch[key] = (patch[key]||0) - 1;

    await bumpDailyStat(currentUser.uid, equipe, currentUser.email, patch);
  }

  await ref.delete();
  alert("Excluído!");
  hydrateMiniCrmEdit();
  hydrateMiniCrmHoje();
  hydrateMyDayStats();
};

window.gerarRelatorioExcel = async function(){
  const snap = await db.collection("leads").where("corretorId","==",currentUser.uid).get();
  if(snap.empty) return alert("Sem registros para relatório.");

  const today = dayKey(nowMs());

  let totalLigacoes = 0;
  let totalNaoAtendeu = 0;
  let totalAtendidos = 0;
  let totalAgend = 0;
  let totalPromessa = 0;
  let totalSemInteresse = 0;

  const atendidosRows = [];

  snap.forEach(ds=>{
    const d = ds.data() || {};

    if(d.timestampDistribuicao && dayKey(d.timestampDistribuicao) === today){
      totalLigacoes += 1;
    }
    if(d.atendeu === false && d.ultimoNaoAtendeuEm && dayKey(d.ultimoNaoAtendeuEm) === today){
      totalNaoAtendeu += 1;
    }

    if(d.atendeu === true && d.timestampFinalizacao && dayKey(d.timestampFinalizacao) === today){
      totalAtendidos += 1;
      if(d.resultado === "AGENDAMENTO") totalAgend += 1;
      else if(d.resultado === "PROMESSA DOCUMENTAÇÃO") totalPromessa += 1;
      else if(d.resultado === "NÃO GEROU INTERESSE") totalSemInteresse += 1;

      const tempoMin = (d.timestampFinalizacao && d.timestampDistribuicao)
        ? Math.max(0, Math.floor((d.timestampFinalizacao - d.timestampDistribuicao)/60000))
        : "";

      atendidosRows.push({
        Cliente: d.nome || "",
        Telefone: d.telefone || "",
        Email: d.email || "",
        Resultado: d.resultado || "",
        "Data/Hora Agendada": d.dataAgendada || "",
        Feedback: d.observacao || "",
        "Tempo Atendimento (min)": tempoMin
      });
    }
  });

  const tempoLogadoMin = loginTimestamp ? Math.max(0, Math.floor((nowMs()-loginTimestamp)/60000)) : 0;

  const resumo = [
    ["Operador", currentUser.email],
    ["Equipe", currentUserData?.equipe || ""],
    ["Tempo total logado (min)", tempoLogadoMin],
    ["Total de ligações (tentativas)", totalLigacoes],
    ["Total NÃO atendeu", totalNaoAtendeu],
    ["Total ATENDIDOS", totalAtendidos],
    ["Agendamentos", totalAgend],
    ["Promessa documentação", totalPromessa],
    ["Não gerou interesse", totalSemInteresse],
    ["Data", today]
  ];

  const wsResumo = XLSX.utils.aoa_to_sheet(resumo);
  const wsAtend  = XLSX.utils.json_to_sheet(atendidosRows);

  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, wsResumo, "Resumo");
  XLSX.utils.book_append_sheet(wb, wsAtend, "Atendidos");

  XLSX.writeFile(wb, `PROEFI_RELATORIO_${today}.xlsx`);
  alert("Relatório Excel gerado (baixado no dispositivo).");
};

/** ✅ LIMPEZA: delete coleção em lote (sem instalar nada) */
async function deleteCollectionInBatches(collectionName, batchSize=400){
  let deleted = 0;
  while(true){
    const snap = await db.collection(collectionName)
      .orderBy(firebase.firestore.FieldPath.documentId())
      .limit(batchSize)
      .get();

    if(snap.empty) break;

    const batch = db.batch();
    snap.docs.forEach(doc => batch.delete(doc.ref));
    await batch.commit();

    deleted += snap.size;
    if($("limpezaStatus")){
      $("limpezaStatus").innerHTML = `Apagando <b>${collectionName}</b>... removidos: <b>${deleted}</b>`;
    }
  }
  return deleted;
}

    $("limpezaStatus").innerHTML = `✅ Coleção <b>${nome}</b> zerada! Total removido: <b>${n}</b>`;

  $("limpezaStatus").innerHTML = `Iniciando limpeza total (leads, listas, stats_diarios)...`;

  try{
    const n1 = await deleteCollectionInBatches("leads", 400);
    const n2 = await deleteCollectionInBatches("listas", 400);
    const n3 = await deleteCollectionInBatches("stats_diarios", 400);
    $("limpezaStatus").innerHTML = `✅ ZERADO com sucesso!<br/>Leads: <b>${n1}</b> • Listas: <b>${n2}</b> • Stats: <b>${n3}</b><br/><span class="small muted">Users foi preservado.</span>`;
  }catch(e){
    $("limpezaStatus").innerHTML = `<span class="danger">Erro: ${e.message}</span>`;
  }
};

function renderDiretorShell(user, data){
  const header = renderHeader(user.email, "diretor");
  let body = "";

  if(currentTab === "painel"){
    body = `
      <div class="card">
        <div><b>Geral • Totais do dia</b></div>
        <div class="divider"></div>
        <div id="totaisGeral" class="small muted">Carregando...</div>
      </div>
    `;
  }

  if(currentTab === "upload"){
    body = `
      <div class="card">
        <div><b>Upload • Lista Geral (Diretoria)</b></div>
        <div class="small muted">Aceita XLS/XLSX/CSV. Colunas: Nome | Telefone | Email</div>
        <div class="divider"></div>
        <input type="file" id="fileDiretor" accept=".xls,.xlsx,.csv" />
        <button class="btn btnGold" onclick="uploadListaGeral()">ENVIAR E DISTRIBUIR</button>
        <div class="small muted">Distribui aleatoriamente no upload para corretores <b>ATIVOS</b>.</div>
      </div>
    `;
  }

  if(currentTab === "aprov"){
    body = `
      <div class="card">
        <div><b>Aprovações pendentes</b></div>
        <div class="small muted">Diretor aprova qualquer equipe e define CORRETOR ou GERENTE.</div>
        <div class="divider"></div>
        <div id="pendentesDiretor" class="small muted">Carregando...</div>
      </div>
    `;
  }

  if(currentTab === "limpeza"){
    body = `
      <div class="card">
        <div><b>🧹 Limpeza / Zerar Operação</b></div>
        <div class="small muted">Use isso para apagar milhares de leads rapidamente (sem console manual).</div>
        <div class="divider"></div>

        <button class="btn btnRed" onclick="zerarColecao('leads')">ZERAR: leads</button>
        <div style="height:10px"></div>
        <button class="btn btnRed" onclick="zerarColecao('listas')">ZERAR: listas</button>
        <div style="height:10px"></div>
        <button class="btn btnRed" onclick="zerarColecao('stats_diarios')">ZERAR: stats_diarios</button>

        <div class="divider"></div>

        <button class="btn btnGold" onclick="zerarTudoOperacional()">ZERAR TUDO OPERACIONAL (menos users)</button>

        <div class="divider"></div>
        <div id="limpezaStatus" class="small muted">Status: aguardando.</div>
      </div>
    `;
  }

  $("app").innerHTML = header + body + renderBottomNav(diretorTabs());
  hydrateDiretorTab();
}

/** =========================
 *  BOOTSTRAP
 *  ========================= */
auth.onAuthStateChanged(async (user)=>{
  if(!user){
    currentUser = null;
    currentUserData = null;
    leadAtualRef = null;
    leadAtualData = null;
    detailsOpen = false;
    openOutcome = null;
    draftAgData = "";
    draftAgHora = "";
    draftObs = "";
    lastLeadId = null;
    loginTimestamp = null;
    currentTab = "painel";
    renderLogin();
    return;
  }

  await ensureFixedDirector(user);

  const userSnap = await db.collection("users").doc(user.uid).get();
  if(!userSnap.exists){
    await ensurePendingUserDoc({
      uid: user.uid,
      email: user.email,
      nome: user.email ? user.email.split("@")[0] : "Usuário",
      equipe: "equipe1",
      solicitadoRole: "corretor"
    });
    renderPending(user, await getUserDoc(user.uid));
    return;
  }

  currentUser = user;
  currentUserData = userSnap.data() || {};

  if(currentUserData.role === "pendente" || currentUserData.aprovado !== true){
    renderPending(user, currentUserData);
    return;
  }

  if(!loginTimestamp) loginTimestamp = nowMs();
  currentTab = currentTab || "painel";

  if(currentUserData.role === "diretor"){
    renderDiretorShell(user, currentUserData);
    return;
  }
  if(currentUserData.role === "gerente"){
    renderGerenteShell(user, currentUserData);
    return;
  }
  renderCorretorShell(user, currentUserData);
});
</script>
