function $(id){ return document.getElementById(id); }
function nowMs(){ return Date.now(); }
function safe(v){ return (v===undefined || v===null) ? "" : String(v); }

function dayKey(ts){
  const d = new Date(ts);
  const y = d.getFullYear();
  const m = String(d.getMonth()+1).padStart(2,'0');
  const da = String(d.getDate()).padStart(2,'0');
  return `${y}-${m}-${da}`;
}
function localHour(){ try{ return new Date().getHours(); }catch(e){ return 0; } }
function isAfterReleaseHour(){ return localHour() >= RANKING_RELEASE_HOUR; }

function viewKeyFor(uid, feature, day){
  return `${DAILY_VIEW_KEY_PREFIX}${uid}__${feature}__${day}`;
}
function canViewOncePerDay({ uid, role, feature }){
  if(role === "diretor") return { ok:true, reason:"" };
  const today = dayKey(nowMs());
  if(!isAfterReleaseHour()){
    return { ok:false, reason:`Liberado apenas após ${RANKING_RELEASE_HOUR}h.` };
  }
  const k = viewKeyFor(uid, feature, today);
  const seen = localStorage.getItem(k);
  if(seen === "1"){
    return { ok:false, reason:`Você já consultou ${feature} hoje.` };
  }
  localStorage.setItem(k, "1");
  return { ok:true, reason:"" };
}

function cleanPhone(raw){ return String(raw||"").replace(/\D/g,''); }
function normalizePhone(raw){
  const d = cleanPhone(raw);
  if(d.length < 10) return "";
  if(d.length > 13) return d.slice(-13);
  return d;
}
function toISODateInput(ts){
  const d = new Date(ts);
  const y = d.getFullYear();
  const m = String(d.getMonth()+1).padStart(2,'0');
  const da = String(d.getDate()).padStart(2,'0');
  return `${y}-${m}-${da}`;
}
function rangeToTs(dateStr, end=false){
  const [y,m,d] = dateStr.split("-").map(n=>parseInt(n,10));
  if(!end) return new Date(y, m-1, d, 0,0,0,0).getTime();
  return new Date(y, m-1, d, 23,59,59,999).getTime();
}
function addDays(ts, days){
  const d = new Date(ts);
  d.setDate(d.getDate() + Number(days||0));
  return d.getTime();
}
function templateMessage(msg, lead){
  const nome = lead?.nome || "";
  const tel  = lead?.telefone || "";
  const em   = lead?.email || "";
  return String(msg || "")
    .replaceAll("{{nome}}", nome)
    .replaceAll("{{telefone}}", tel)
    .replaceAll("{{email}}", em);
}
function buildSmsHref(telClean, encodedText){
  return `sms:${telClean}?&body=${encodedText}`;
}
async function getUserDoc(uid){

function beepCash(){
  try{
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const o = ctx.createOscillator();
    const g = ctx.createGain();
    o.type = "triangle";
    o.frequency.setValueAtTime(740, ctx.currentTime);
    g.gain.setValueAtTime(0.001, ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.25, ctx.currentTime + 0.01);
    g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.22);
    o.connect(g); g.connect(ctx.destination);
    o.start();
    o.stop(ctx.currentTime + 0.25);
  }catch(e){}
}

/** =========================
 *  STATS DIÁRIO (economia)
 *  ========================= */
function statsDocIdCorretor(day, uid){ return `CORRETOR__${day}__${uid}`; }
function statsDocIdEmpresa(day){ return `EMPRESA__${day}`; }

function pointsForResult(res){
  if(res === "AGENDAMENTO") return 10;
  if(res === "PROMESSA DOCUMENTAÇÃO") return 6;
  if(res === "INTERESSADO") return 2;
  if(res === "NÃO GEROU INTERESSE") return 1;
  return 0;
}

async function bumpStatsAttempt({ day, uid, equipe, nome, email }){
  const docId = statsDocIdCorretor(day, uid);
  const empId = statsDocIdEmpresa(day);
  const expireAt = firebase.firestore.Timestamp.fromMillis(addDays(nowMs(), TTL_STATS_DIAS));

  const baseCor = {
    day, tipo:"CORRETOR", corretorId:uid,
    equipe: equipe || "equipe1",
    nome: nome || "",
    email: email || "",
    kindDay: `CORRETOR__${day}`,
    atualizadoEm: nowMs(),
    expireAt
  };

  const baseEmp = {
    day, tipo:"EMPRESA",
    kindDay: `EMPRESA__${day}`,
    atualizadoEm: nowMs(),
    expireAt
  };

  const inc = firebase.firestore.FieldValue.increment(1);

  await Promise.all([
    db.collection("statsDiario").doc(docId).set({ ...baseCor, tentativas: inc }, { merge:true }),
    db.collection("statsDiario").doc(empId).set({ ...baseEmp, tentativas: inc }, { merge:true })
  ]);
}

async function bumpStatsFinalize({ day, uid, equipe, nome, email, resultado }){
  const docId = statsDocIdCorretor(day, uid);
  const empId = statsDocIdEmpresa(day);
  const expireAt = firebase.firestore.Timestamp.fromMillis(addDays(nowMs(), TTL_STATS_DIAS));

  const baseCor = {
    day, tipo:"CORRETOR", corretorId:uid,
    equipe: equipe || "equipe1",
    nome: nome || "",
    email: email || "",
    kindDay: `CORRETOR__${day}`,
    atualizadoEm: nowMs(),
    expireAt
  };

  const baseEmp = {
    day, tipo:"EMPRESA",
    kindDay: `EMPRESA__${day}`,
    atualizadoEm: nowMs(),
    expireAt
  };

  const inc = firebase.firestore.FieldValue.increment(1);
  const pts = pointsForResult(resultado);
  const incPts = firebase.firestore.FieldValue.increment(pts);

  const patchByRes = {};
  if(resultado === "AGENDAMENTO") patchByRes.ag = inc;
  else if(resultado === "PROMESSA DOCUMENTAÇÃO") patchByRes.pr = inc;
  else if(resultado === "INTERESSADO") patchByRes.interessado = inc;
  else if(resultado === "NÃO GEROU INTERESSE") patchByRes.si = inc;

  const patch = { ...patchByRes, atendidos: inc, pontos: incPts };

  await Promise.all([
    db.collection("statsDiario").doc(docId).set({ ...baseCor, ...patch }, { merge:true }),
    db.collection("statsDiario").doc(empId).set({ ...baseEmp, ...patch }, { merge:true })
  ]);
}

async function fetchStatsCorretorHoje(){
  const day = dayKey(nowMs());
  const snap = await db.collection("statsDiario")
    .where("kindDay","==",`CORRETOR__${day}`)
    .get();
  const arr = [];
  snap.forEach(d=> arr.push({ id:d.id, ...(d.data()||{}) }));
  return arr;
}

function parseSheetRows(workbook){
  const sheetName = workbook.SheetNames[0];
  const ws = workbook.Sheets[sheetName];
  const rows = XLSX.utils.sheet_to_json(ws, { header: 1, raw: false, defval: "" });
  const clean = rows.filter(r => r && r.some(cell => String(cell).trim() !== ""));
  return clean;
}
function detectHeaderRow(rows){
  const keys = ["nome","telefone","celular","contato","email","e-mail"];
  for(let i=0;i<Math.min(5, rows.length);i++){
    const row = rows[i].map(c=>String(c).toLowerCase().trim());
    const hit = row.some(c => keys.includes(c));
    if(hit) return i;
  }
  return 0;
}
function mapLeadColumns(row){
  const nome = String(row[0] || "").trim();
  const telefone = String(row[1] || "").trim();
  const email = String(row[2] || "").trim();
  return { nome, telefone, email };
}

function makeLeadDoc(base){
  const ts = nowMs();
  const exp = firebase.firestore.Timestamp.fromMillis(addDays(ts, TTL_LEADS_DIAS));
  return {

async function uploadLeadsFromFile({ file, origem, equipe, donoUploadUid }){
  const arrayBuffer = await file.arrayBuffer();
  const workbook = XLSX.read(arrayBuffer, { type: "array" });
  const rows = parseSheetRows(workbook);
  if(rows.length === 0) throw new Error("Planilha vazia.");

  const headerIndex = detectHeaderRow(rows);
  const dataRows = rows.slice(headerIndex + 1);

  const parsed = [];
  for(const r of dataRows){
    const lead = mapLeadColumns(r);
    const telN = normalizePhone(lead.telefone);
    if(!telN) continue;
    parsed.push({ ...lead, telefoneNorm: telN });
  }
  if(parsed.length === 0) throw new Error("Nenhum lead válido (verifique colunas A/B/C).");

  const uniqMap = new Map();
  for(const p of parsed){
    if(!uniqMap.has(p.telefoneNorm)){
      uniqMap.set(p.telefoneNorm, p);
    }
  }
  const uniq = Array.from(uniqMap.values());

  const exp = firebase.firestore.Timestamp.fromMillis(addDays(nowMs(), TTL_LEADS_DIAS));
  const listaDoc = await db.collection("listas").add({
    origem,
    equipe: equipe || null,
    donoUpload: donoUploadUid,
    arquivoNome: file.name,
    totalRecebido: parsed.length,
    totalUnico: uniq.length,
    criadoEm: nowMs(),
    expireAt: exp
  });
  const listaRefId = listaDoc.id;

  const batchSize = 350;
  let idx = 0;
  while(idx < uniq.length){
    const batch = db.batch();
    const slice = uniq.slice(idx, idx + batchSize);
    for(const leadBase of slice){
      const docRef = db.collection("leads").doc();
      const doc = makeLeadDoc(leadBase);

      doc.origem = origem;
      doc.equipe = equipe || null;
      doc.donoUpload = donoUploadUid;
      doc.listaRef = listaRefId;

      doc.corretorId = null;
      doc.corretorEmail = null;
      doc.status = "fila";

      batch.set(docRef, doc);
    }
    await batch.commit();
    idx += batchSize;
  }

  return { totalRecebido: parsed.length, totalUnico: uniq.length, listaRefId };
}

/** =========================
 *  Lead picking (ECONOMIA + COMPAT FIX)
 *  - FIX: Transaction.get NÃO aceita Query no compat
 *  - Agora: query fora + transaction só no docRef
 *  ========================= */
async function pickNextLeadForCorretor({ source, corretorUid, corretorEmail, equipeCorretor, corretorNome }){
  let q = db.collection("leads")
    .where("status","==","fila");

  if(source === "geral"){
    q = q.where("origem","==","geral").where("corretorId","==",null);
  }else if(source === "gerente"){
    q = q.where("origem","==","gerente").where("equipe","==",equipeCorretor).where("corretorId","==",null);
  }else{
    q = q.where("origem","==","corretor").where("donoUpload","==",corretorUid).where("corretorId","==",null);
  }

  q = q.orderBy("filaOrdem","asc").limit(1);

  const agora = nowMs();
  const today = dayKey(agora);

  // Tenta algumas vezes caso haja corrida (2 corretores pegando ao mesmo tempo)
  for(let attempt=0; attempt<4; attempt++){
    // 1) busca 1 doc fora da transaction
    const snap = await q.get();
    if(snap.empty) return null;

    const docSnap = snap.docs[0];
    const ref = docSnap.ref;

    // 2) transaction só no DocumentReference (compat)
    const result = await db.runTransaction(async (tx)=>{
      const fresh = await tx.get(ref);
      if(!fresh.exists) return null;

      const data = fresh.data() || {};

      // Se alguém já pegou, aborta
      if(data.status !== "fila") return null;
      if(data.corretorId !== null) return null;

      tx.update(ref, {
        status: "em_atendimento",
        corretorId: corretorUid,
        corretorEmail: corretorEmail || null,
        equipe: data.equipe || equipeCorretor || null,
        emAtendimentoEm: agora,
        timestampDistribuicao: agora,
        atualizadoEm: agora,

        totalTentativas: firebase.firestore.FieldValue.increment(1),
        [`tentativasPorCorretor.${corretorUid}`]: firebase.firestore.FieldValue.increment(1),
        [`_lastTryDayByCorretor.${corretorUid}`]: today
      });

      return {
        ref,
        data: {
          ...data,
          status:"em_atendimento",
          corretorId:corretorUid,
          corretorEmail:corretorEmail || null,
          equipe: data.equipe || equipeCorretor || null,
          emAtendimentoEm:agora,
          timestampDistribuicao:agora,
          atualizadoEm:agora
        }
      };
    }).catch(()=> null);

    if(!result){
      // corrida: tenta de novo
      continue;
    }

    // stats (writes pequenas)
    bumpStatsAttempt({
      day: today,
      uid: corretorUid,
      equipe: (result.data.equipe || equipeCorretor || "equipe1"),
      nome: corretorNome || "",
      email: corretorEmail || ""
    }).catch(()=>{});

    return result;
  }

  // se cair aqui, provavelmente rolou corrida repetida
  return null;
}

  let dataAgendada = null;

  if(resultado === "AGENDAMENTO"){

    if(!d || !h) return alert("Preencha data e horário do agendamento.");

    obs = ($("obsAg").value || "").trim();

    obs = ($("obsPr").value || "").trim();
  }else if(resultado === "INTERESSADO"){
    const fbIn = ($("fbIn").value || "").trim();
    if(!fbIn) return alert("Feedback é obrigatório.");
    obs = fbIn;

    const fb = ($("fb").value || "").trim();
    if(!fb) return alert("Feedback é obrigatório.");
    obs = fb;
  }

  const ok = await openModal("Confirmar", `Finalizar como: ${resultado}?`);

  const agora = nowMs();

  await leadAtualRef.update({

    resultado,
    observacao: obs || null,
    dataAgendada: dataAgendada,
    timestampFinalizacao: agora,
    atualizadoEm: agora
  });

  if(resultado === "AGENDAMENTO" || resultado === "PROMESSA DOCUMENTAÇÃO"){
    beepCash();
  }

  bumpStatsFinalize({
    day: today,
    uid: auth.currentUser.uid,
    equipe: me.equipe || "equipe1",
    nome: me.nome || "",
    email: auth.currentUser.email || "",

  leadAtualData = null;
  detailsOpen = false;
  $("leadArea").innerHTML = `<div class="center ok">Atendimento finalizado! Pegue o próximo.</div>`;

      const s = snap.exists ? snap.data() : null;

      if(!s){
        box.innerHTML = `<div class="muted">Sem stats hoje ainda.</div>`;
        return;
      }

      box.innerHTML = `
        <div><b>Seu resumo de hoje</b></div>
        <div class="divider"></div>
        <div class="small muted">Tentativas: <b>${s.tentativas||0}</b></div>
        <div class="small muted">Atendidos: <b>${s.atendidos||0}</b></div>
        <div class="small muted">Agendamentos: <b>${s.ag||0}</b></div>
        <div class="small muted">Promessas: <b>${s.pr||0}</b></div>
        <div class="small muted">Interessados: <b>${s.interessado||0}</b></div>
        <div class="small muted">Sem interesse: <b>${s.si||0}</b></div>
        <div class="divider"></div>
        <div><b>Pontos:</b> ${s.pontos||0}</div>
      `;
      return;
    }

    const stats = await fetchStatsCorretorHoje();
    const equipe = me.equipe || "equipe1";
    let scoped = stats;
    if(role === "gerente"){
      scoped = stats.filter(x => (x.equipe||"") === equipe);
    }
    const sum = (key)=> scoped.reduce((a,x)=> a + Number(x[key]||0), 0);

    box.innerHTML = `
      <div><b>Resumo de hoje (${role==="gerente" ? "Equipe "+equipe : "Empresa"})</b></div>
      <div class="divider"></div>
      <div class="small muted">Tentativas: <b>${sum("tentativas")}</b></div>
      <div class="small muted">Atendidos: <b>${sum("atendidos")}</b></div>
      <div class="small muted">Agendamentos: <b>${sum("ag")}</b></div>
      <div class="small muted">Promessas: <b>${sum("pr")}</b></div>
      <div class="small muted">Interessados: <b>${sum("interessado")}</b></div>
      <div class="small muted">Sem interesse: <b>${sum("si")}</b></div>
      <div class="divider"></div>
      <div><b>Pontos:</b> ${sum("pontos")}</div>
    `;
  }catch(e){
    box.innerHTML = `<div class="errorBox">Erro no Mini CRM:\n${safe(e.message || e.code || e)}</div>`;
  }
};

/** =========================
 *  BOOTSTRAP AUTH
 *  ========================= */
auth.onAuthStateChanged(async (user)=>{
  if(!user){
    cachedAuthUser = null;
    cachedUserData = null;
    leadAtualRef = null;
    leadAtualData = null;
    detailsOpen = false;
    currentTab = "painel";
    renderLogin();
    return;
  }

  cachedAuthUser = user;

  const snap = await db.collection("users").doc(user.uid).get();
  if(!snap.exists){
    await db.collection("users").doc(user.uid).set({
      email: user.email || "",
      nome: "",
      equipe: "equipe1",
      role: (String(user.email||"").toLowerCase() === MASTER_DIRECTOR_EMAIL.toLowerCase()) ? "diretor" : "corretor",
      aprovado: (String(user.email||"").toLowerCase() === MASTER_DIRECTOR_EMAIL.toLowerCase()),
      criadoEm: nowMs(),
      ativo:false,
      ativoAtualizadoEm: nowMs(),
      mensagemPadrao: "Olá {{nome}}, aqui é da equipe Alvena. Estou tentando falar com você sobre seu interesse."
    });
  }

  cachedUserData = await getUserDoc(user.uid);

  if(String(user.email||"").toLowerCase() === MASTER_DIRECTOR_EMAIL.toLowerCase()){
    if(!cachedUserData.aprovado || cachedUserData.role !== "diretor"){
      await db.collection("users").doc(user.uid).update({ aprovado:true, role:"diretor" });
      cachedUserData = await getUserDoc(user.uid);
    }
  }

  if(!cachedUserData.aprovado){
    renderPendingApproval();
    return;
  }

  if(cachedUserData.role !== "corretor" && currentTab === "atendimento") currentTab = "painel";

  await renderAppShell();
});
