function cleanPhone(raw){ return String(raw||"").replace(/\D/g,''); }

function dayKey(ts){
  const d = new Date(ts);
  const y = d.getFullYear();
  const m = String(d.getMonth()+1).padStart(2,'0');
  const da = String(d.getDate()).padStart(2,'0');
  return `${y}-${m}-${da}`;
}
function timeMin(ms){ return Math.max(0, Math.floor(ms/60000)); }

function toISODateInput(ts){
  const d = new Date(ts);
  const y = d.getFullYear();
  const m = String(d.getMonth()+1).padStart(2,'0');
  const da = String(d.getDate()).padStart(2,'0');
  return `${y}-${m}-${da}`;
}
function isoDaysAgo(days){
  const d = new Date();
  d.setDate(d.getDate() - Number(days || 0));
  return toISODateInput(d.getTime());
}
function rangeToTs(dateStr, end=false){
  const [y,m,d] = dateStr.split("-").map(n=>parseInt(n,10));
  if(!end) return new Date(y, m-1, d, 0,0,0,0).getTime();
  return new Date(y, m-1, d, 23,59,59,999).getTime();
}
function daysBetweenISO(de, ate){
  try{
    const a = rangeToTs(de, false);
    const b = rangeToTs(ate, true);
    return Math.max(1, Math.ceil((b-a+1) / (24*60*60*1000)));
  }catch(e){ return 1; }
}

function templateMessage(msg, lead){
  const nome = lead?.nome || "";
  const tel  = lead?.telefone || "";
  const em   = lead?.email || "";
  return String(msg || "")
    .replaceAll("{{nome}}", nome)
    .replaceAll("{{telefone}}", tel)
    .replaceAll("{{email}}", em);
}

function beepCash(){
  try{
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const o = ctx.createOscillator();
    const g = ctx.createGain();
    o.type = "triangle";
    o.frequency.setValueAtTime(740, ctx.currentTime);
    g.gain.setValueAtTime(0.001, ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.25, ctx.currentTime + 0.01);
    g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.22);
    o.connect(g); g.connect(ctx.destination);
    o.start();
    o.stop(ctx.currentTime + 0.25);
  }catch(e){}
}

/** =========================
 *  LEADS: upload/import
 *  ========================= */
function parseSheetRows(workbook){
  const sheetName = workbook.SheetNames[0];
  const ws = workbook.Sheets[sheetName];
  const rows = XLSX.utils.sheet_to_json(ws, { header: 1, raw: false, defval: "" });
  const clean = rows.filter(r => r && r.some(cell => String(cell).trim() !== ""));
  return clean;
}
function detectHeaderRow(rows){
  const keys = ["nome","telefone","celular","contato","email","e-mail"];
  for(let i=0;i<Math.min(5, rows.length);i++){
    const row = rows[i].map(c=>String(c).toLowerCase().trim());
    const hit = row.some(c => keys.includes(c));
    if(hit) return i;
  }
  return 0;
}
function mapLeadColumns(row){
  const nome = String(row[0] || "").trim();
  const telefone = String(row[1] || "").trim();
  const email = String(row[2] || "").trim();
  return { nome, telefone, email };
}
function makeLeadDoc(base){
  const ts = nowMs();
  return {
    nome: base.nome || "",
    telefone: base.telefone || "",
    email: base.email || "",
    status: "fila",
    corretorId: null,
    corretorEmail: null,
    equipe: null,
    origem: null, // geral | gerente | corretor
    donoUpload: null,
    listaRef: null,

    criadoEm: ts,
    atualizadoEm: ts,

    emAtendimentoEm: null,
    timestampDistribuicao: null,
    timestampFinalizacao: null,

    // ✅ NOVO: ordenação da fila (usada no JS, sem exigir índice composto)
    // menor = mais antigo (atende antes). Quando "NÃO ATENDEU", vira "agora" => vai pro fim.
    filaOrdem: ts,

    // Mantive o campo por compatibilidade (mas não usamos mais para voltar em 5 min)
    cooldownAte: null,

    atendeu: null,
    resultado: null,
    observacao: null,
    dataAgendada: null,

    totalTentativas: 0,
    tentativasPorCorretor: {},
  };
}

async function uploadLeadsFromFile({ file, origem, equipe, donoUploadUid, distribuirGeralAgora }){
  const arrayBuffer = await file.arrayBuffer();
  const workbook = XLSX.read(arrayBuffer, { type: "array" });
  const rows = parseSheetRows(workbook);
  if(rows.length === 0) throw new Error("Planilha vazia.");

  const headerIndex = detectHeaderRow(rows);
  const dataRows = rows.slice(headerIndex + 1);

  const parsed = [];
  for(const r of dataRows){
    const lead = mapLeadColumns(r);
    if(!lead.nome && !lead.telefone && !lead.email) continue;
    if(!lead.telefone) continue;
    parsed.push(lead);
  }
  if(parsed.length === 0) throw new Error("Nenhum lead válido (verifique colunas A/B/C).");

  const listaDoc = await db.collection("listas").add({
    origem,
    equipe: equipe || null,
    donoUpload: donoUploadUid,
    arquivoNome: file.name,
    total: parsed.length,
    criadoEm: nowMs()
  });
  const listaRefId = listaDoc.id;

  let corretoresAtivos = [];
  if(origem === "geral" && distribuirGeralAgora){
    const snap = await db.collection("users")
      .where("role","==","corretor")
      .where("aprovado","==",true)
      .where("ativo","==",true)
      .get();
    corretoresAtivos = snap.docs.map(d => ({ uid: d.id, ...d.data() }));
    if(corretoresAtivos.length === 0){
      throw new Error("Nenhum corretor ATIVO agora. Peça para clicarem 'ESTOU ATIVO' antes do upload geral.");
    }
  }

  const batchSize = 350;
  let idx = 0;
  while(idx < parsed.length){
    const batch = db.batch();
    const slice = parsed.slice(idx, idx + batchSize);
    for(const leadBase of slice){
      const docRef = db.collection("leads").doc();
      const doc = makeLeadDoc(leadBase);

      doc.origem = origem;
      doc.equipe = equipe || null;
      doc.donoUpload = donoUploadUid;
      doc.listaRef = listaRefId;

      if(origem === "geral" && distribuirGeralAgora){
        const chosen = corretoresAtivos[Math.floor(Math.random() * corretoresAtivos.length)];
        doc.corretorId = chosen.uid;
        doc.corretorEmail = chosen.email || null;
        doc.status = "fila";
      }

      batch.set(docRef, doc);
    }
    await batch.commit();
    idx += batchSize;
  }

  return { total: parsed.length, listaRefId };
}

/** =========================
 *  Lead picking (sem exigir índice composto)
 *  ========================= */
function leadSortValue(x){
  // menor => vem primeiro. Se não existir, cai para criadoEm.
  const fo = (x && typeof x.filaOrdem === "number") ? x.filaOrdem : null;
  if(typeof fo === "number") return fo;
  const ce = (x && typeof x.criadoEm === "number") ? x.criadoEm : 0;
  return ce || 0;
}

async function pickNextLeadForCorretor({ source, corretorUid, corretorEmail, equipeCorretor }){
  let q = db.collection("leads").where("status","==","fila");

  if(source === "geral"){
    q = q.where("origem","==","geral").where("corretorId","==",corretorUid);
  }else if(source === "gerente"){
    q = q.where("origem","==","gerente").where("equipe","==",equipeCorretor).where("corretorId","==",null);
  }else{
    q = q.where("origem","==","corretor").where("donoUpload","==",corretorUid).where("corretorId","==",null);
  }

  // ✅ Sem cooldown e sem orderBy (evita índices). Pegamos um lote e ordenamos no JS.
  const snap = await q.limit(40).get();
  if(snap.empty) return null;

  const docs = snap.docs.map(d => ({ doc:d, data:(d.data()||{}) }));
  docs.sort((a,b)=> leadSortValue(a.data) - leadSortValue(b.data));

  const chosen = docs[0];
  if(!chosen) return null;

  const ref = chosen.doc.ref;
  const data = chosen.data;

  const agora = nowMs();

  await ref.update({
    status: "em_atendimento",
    corretorId: corretorUid,
    corretorEmail: corretorEmail || null,
    equipe: data.equipe || equipeCorretor || null,
    emAtendimentoEm: agora,
    timestampDistribuicao: agora,
    atualizadoEm: agora,

    cooldownAte: null,

    totalTentativas: firebase.firestore.FieldValue.increment(1),
    [`tentativasPorCorretor.${corretorUid}`]: firebase.firestore.FieldValue.increment(1),
    [`_lastTryDayByCorretor.${corretorUid}`]: dayKey(agora)
  });

  // Uma leitura para pegar o doc atualizado (mantive para garantir consistência)
  const fresh = await ref.get();
  return { ref, data: fresh.data() };
}

/** =========================
 *  USERS MAP (nomes)
 *  ========================= */
async function fetchUsersMapByIds(ids){
  const uniq = Array.from(new Set((ids||[]).filter(Boolean)));
  if(!uniq.length) return {};
  const chunks = [];
  const copy = uniq.slice();
  while(copy.length) chunks.push(copy.splice(0, 10));

  const map = {};
  for(const c of chunks){
    const snap = await db.collection("users")
      .where(firebase.firestore.FieldPath.documentId(),"in",c)
      .get();
    snap.forEach(d=>{ map[d.id] = d.data(); });
  }
  return map;
}

  return safe((u && u.nome) ? u.nome : (row.corretorEmail || row.corretorId));
}

// ✅ LIMITES mais baixos para não estourar leitura
async function fetchFinalizadosRecentes({ limit=800 }={}){
  const snap = await db.collection("leads")
    .orderBy("timestampFinalizacao","desc")
    .limit(limit)
    .get();

  const arr = [];
  snap.forEach(d=>{
    const x = d.data() || {};
    if(!x.timestampFinalizacao) return;
    arr.push({ id:d.id, ...x });
  });
  return arr;
}

async function fetchTentativasRecentes({ limit=1200 }={}){
  const snap = await db.collection("leads")
    .orderBy("timestampDistribuicao","desc")
    .limit(limit)
    .get();

  const arr = [];
  snap.forEach(d=>{
    const x = d.data() || {};
    if(!x.timestampDistribuicao) return;
    arr.push({ id:d.id, ...x });
  });
  return arr;
}

function inRange(ts, startTs, endTs){
  return (typeof ts === "number") && ts >= startTs && ts <= endTs;
}

function applyScope(list, { scope, myUser }){
  if(scope === "corretor"){
    return list.filter(x => x.corretorId === myUser.uid);
  }
  if(scope === "gerente"){
    const eq = myUser.equipe || "equipe1";
    return list.filter(x => (x.equipe||"") === eq);
  }
  return list; // diretor: tudo
}

// ✅ Proteção: limita relatório pesado para no máximo 7 dias (evita travar/estourar quota)
async function fetchLeadsForPeriodNoIndex({ scope, myUser, de, ate }){
  const startTs = rangeToTs(de, false);
  const endTs   = rangeToTs(ate, true);

  // Se o período for grande, a chance de estourar leituras é alta.
  // Mantemos seguro: limite de 7 dias (você pediu foco em não travar).
  const dias = daysBetweenISO(de, ate);
  const safeDias = Math.min(dias, 7);

  let safeDe = de;
  if(dias > 7){
    // recorta para os últimos 7 dias até "ate"
    const end = rangeToTs(ate, false);
    const d = new Date(end);
    d.setDate(d.getDate() - 6);
    safeDe = toISODateInput(d.getTime());
  }

  const startSafe = rangeToTs(safeDe, false);
  const endSafe   = endTs;

  const [finalizadosAll, tentativasAll] = await Promise.all([
    fetchFinalizadosRecentes({ limit: 800 + (safeDias * 120) }),
    fetchTentativasRecentes({ limit: 1200 + (safeDias * 180) })
  ]);

  let finals = finalizadosAll.filter(x => inRange(x.timestampFinalizacao, startSafe, endSafe) && (x.status === "finalizado" || x.atendeu === true || !!x.resultado));
  let tries  = tentativasAll.filter(x => inRange(x.timestampDistribuicao, startSafe, endSafe));

  finals = applyScope(finals, { scope, myUser });
  tries  = applyScope(tries,  { scope, myUser });

  return { finals, tries, safeDe, safeAte: ate, wasClamped: (dias > 7) };
}

function computeScoreboard({ finals, tries }){
  const byCorretor = {};

  for(const t of (tries||[])){
    const cid = t.corretorId || "SEM";
    if(cid === "SEM") continue;
    if(!byCorretor[cid]){
      byCorretor[cid] = { corretorId: cid, corretorEmail: t.corretorEmail||"", tentativas:0, atendidos:0, ag:0, pr:0, si:0, pontos:0 };
    }
    byCorretor[cid].tentativas += 1;
  }

  for(const f of (finals||[])){
    const cid = f.corretorId || "SEM";
    if(cid === "SEM") continue;
    if(!byCorretor[cid]){
      byCorretor[cid] = { corretorId: cid, corretorEmail: f.corretorEmail||"", tentativas:0, atendidos:0, ag:0, pr:0, si:0, pontos:0 };
    }
    byCorretor[cid].atendidos += 1;

    if(f.resultado === "AGENDAMENTO"){ byCorretor[cid].ag += 1; byCorretor[cid].pontos += 10; }
    else if(f.resultado === "PROMESSA DOCUMENTAÇÃO"){ byCorretor[cid].pr += 1; byCorretor[cid].pontos += 6; }
    else if(f.atendeu === true){ byCorretor[cid].si += 1; byCorretor[cid].pontos += 1; }
  }

  const list = Object.values(byCorretor);
  list.sort((a,b)=> (b.pontos - a.pontos) || (b.ag - a.ag) || (b.pr - a.pr) || (b.atendidos - a.atendidos));
  return list;
}

/** =========================
 *  SHELL RENDER
 *  ========================= */
async function renderAppShell(){
  const user = cachedAuthUser;
  const ud = cachedUserData;
  if(!user || !ud) return;

  const emailLower = (user.email||"").toLowerCase();
  if(emailLower === MASTER_DIRECTOR_EMAIL.toLowerCase() && ud.role !== "diretor"){
    await db.collection("users").doc(user.uid).update({ role:"diretor", aprovado:true });
    cachedUserData.role = "diretor";
  }

  const role = ud.role || "corretor";
  const extra = (role==="corretor") ? activeBadge(!!ud.ativo) :
                (role==="gerente") ? `<span class="pill">Equipe: ${safe(ud.equipe||"equipe1")}</span>` :
                `<span class="pill">DIRETORIA</span>`;

  let html = `${renderHeader(role, user.email, `<div>${extra}</div>`)}`;

  if(currentTab === "painel") html += await renderPainel(role, user, ud);
  else if(currentTab === "atendimento") html += await renderAtendimento(role, user, ud);
  else if(currentTab === "minicrm") html += await renderMiniCRM(role, user, ud);
  else if(currentTab === "resultados") html += await renderResultados(role, user, ud);
  else if(currentTab === "config") html += await renderConfig(role, user, ud);
  else if(currentTab === "aprovacao") html += await renderAprovacao(role, user, ud);
  else html += `<div class="card">Aba inválida</div>`;

  html += renderTabsForRole(role);

  $("app").innerHTML = html;

  try{
    const de = $("repDe"); const ate = $("repAte");
    if(de && !de.value) de.value = toISODateInput(nowMs());
    if(ate && !ate.value) ate.value = toISODateInput(nowMs());
  }catch(e){}
}

  if(leadAtualRef) return alert("Você já está com um lead em atendimento. Finalize antes.");

  const source = $("leadSource").value;
  const equipe = me.equipe || "equipe1";

  const picked = await pickNextLeadForCorretor({
    source,
    corretorUid: user.uid,
    corretorEmail: user.email,

window.toggleCollapse = function(id){
  const el = $(id);
  const open = el.classList.contains("open");
  ["cAg","cPr","cSi"].forEach(x=>{
    const e = $(x); if(e) e.classList.remove("open");
  });
  if(!open) el.classList.add("open");
};

window.confirmarAtendeu = async function(resultado){
  if(!leadAtualRef) return;
  const me = cachedUserData; // ✅ sem leitura
  if(!me || !me.ativo) return alert("Você está PAUSADO. Não pode finalizar.");

  let dataAgendada = null;
  let obs = null;

  if(resultado === "AGENDAMENTO"){
    const d = $("agData").value;
    const h = $("agHora").value;
    if(!d || !h) return alert("Preencha data e horário do agendamento.");
    dataAgendada = `${d} ${h}`;
    obs = ($("obsAg").value || "").trim();
  }else if(resultado === "PROMESSA DOCUMENTAÇÃO"){
    obs = ($("obsPr").value || "").trim();
  }else{
    const fb = ($("fb").value || "").trim();
    if(!fb) return alert("Feedback é obrigatório.");
    obs = fb;
  }

  const ok = await openModal("Confirmar", `Finalizar como: ${resultado}?`);
  if(!ok) return;

  await leadAtualRef.update({
    status: "finalizado",
    atendeu: true,
    resultado,
    observacao: obs || null,
    dataAgendada: dataAgendada,
    timestampFinalizacao: nowMs(),
    atualizadoEm: nowMs()
  });

  if(resultado === "AGENDAMENTO" || resultado === "PROMESSA DOCUMENTAÇÃO"){
    beepCash();
  }

  leadAtualRef = null;
  leadAtualData = null;
  detailsOpen = false;
  $("leadArea").innerHTML = `<div class="center ok">Atendimento finalizado! Pegue o próximo.</div>`;
};

  box.innerHTML = `<div class="muted">Carregando...</div>`;

  try{
    const user = auth.currentUser;
    const me = cachedUserData || await getUserDoc(user.uid); // fallback
    const role = me.role;

    // ✅ reduzido de 2500 para 800 (proteção de leituras)
    let list = await fetchFinalizadosRecentes({ limit: 800 });

    list = list.filter(x => x.resultado === "AGENDAMENTO" || x.resultado === "PROMESSA DOCUMENTAÇÃO");

    if(role === "corretor"){
      list = list.filter(x => x.corretorId === user.uid);
    }else if(role === "gerente"){
      const eq = me.equipe || "equipe1";
      list = list.filter(x => (x.equipe||"") === eq);
    }

    if(list.length === 0){
      box.innerHTML = `<div class="muted">Sem agendamentos/promessas ainda.</div>`;
      return;
    }

    const ids = list.map(x=>x.corretorId).filter(Boolean);
    const usersMap = await fetchUsersMapByIds(ids);

    const items = list.slice(0, 60).map(l=>{
      const who = displayCorretorName(l, usersMap);
      const tagClass = (l.resultado==="AGENDAMENTO") ? "tagAg" : "tagPr";
      const tag = (l.resultado==="AGENDAMENTO") ? "AGENDAMENTO" : "PROMESSA";

      if(role === "diretor"){
        return `
          <div class="item">
            <div class="itemTop">
              <span class="tag ${tagClass}">${tag}</span>
              <span class="small muted">${new Date(l.timestampFinalizacao).toLocaleString()}</span>
            </div>
            <div style="margin-top:8px"><b>Corretor:</b> ${who}</div>
          </div>
        `;
      }

      if(role === "gerente"){
        return `
          <div class="item">
            <div class="itemTop">
              <span class="tag ${tagClass}">${tag}</span>
              <span class="small muted">${new Date(l.timestampFinalizacao).toLocaleString()}</span>
            </div>
            <div style="margin-top:8px"><b>${safe(l.nome||"")}</b></div>
            <div class="small muted">${safe(l.telefone||"")}</div>
            <div style="margin-top:6px"><b>Corretor:</b> ${who}</div>
          </div>
        `;
      }

      return `
        <div class="item">
          <div class="itemTop">
            <span class="tag ${tagClass}">${tag}</span>
            <span class="small muted">${new Date(l.timestampFinalizacao).toLocaleString()}</span>
          </div>
          <div style="margin-top:8px"><b>${safe(l.nome||"")}</b></div>
          <div class="small muted">${safe(l.telefone||"")} • ${safe(l.email||"")}</div>
          <div class="small muted" style="margin-top:6px">${safe(l.observacao||"")}</div>
        </div>
      `;
    }).join("");

    box.innerHTML = `<div class="list">${items}</div>`;
  }catch(e){
    box.innerHTML = `<div class="errorBox">Erro ao carregar Mini CRM:\n${safe(e.message || e.code || e)}</div>`;
  }
};

window.gerarRelatorioExcelPeriodo = async function(){
  const box = $("resultsBox");
  if(box) box.innerHTML = `<div class="muted">Gerando relatório...</div>`;

  try{
    const user = auth.currentUser;
    const me = cachedUserData || await getUserDoc(user.uid);
    const role = me.role;

    if(role === "corretor"){
      alert("Relatório Excel disponível apenas para GERENTE e DIRETOR.");
      return;
    }

    const de = $("repDe").value || toISODateInput(nowMs());
    const ate = $("repAte").value || toISODateInput(nowMs());

    const scope = (role==="gerente") ? "gerente" : "diretor";

    const { finals, tries, safeDe, safeAte, wasClamped } = await fetchLeadsForPeriodNoIndex({
      scope,
      myUser: { uid:user.uid, equipe: me.equipe },
      de, ate
    });

    const sb = computeScoreboard({ finals, tries });

    const totalTentativas = tries.length;
    const totalAtendidos = finals.length;
    const totalAg = finals.filter(x=>x.resultado==="AGENDAMENTO").length;
    const totalPr = finals.filter(x=>x.resultado==="PROMESSA DOCUMENTAÇÃO").length;
    const totalSi = finals.filter(x=>x.resultado==="NÃO GEROU INTERESSE").length;

    const resumo = [
      ["PROEFI - ALVENA", ""],
      ["Perfil", role.toUpperCase()],
      ["Email", user.email],
      ["Equipe", me.equipe || ""],
      ["Período (seguro)", `${safeDe} até ${safeAte}`],
      ["Aviso", wasClamped ? "Período maior que 7 dias foi reduzido para evitar estourar leituras." : "OK"],
      ["", ""],
      ["Total tentativas", totalTentativas],
      ["Total atendidos", totalAtendidos],
      ["Agendamentos", totalAg],
      ["Promessas", totalPr],
      ["Não gerou interesse", totalSi],
    ];
    const wsResumo = XLSX.utils.aoa_to_sheet(resumo);

    const ids = sb.map(x=>x.corretorId);
    const usersMap = await fetchUsersMapByIds(ids);

    const rankRows = sb.map((r, i)=>({
      Rank: i+1,
      Corretor: displayCorretorName(r, usersMap),
      Tentativas: r.tentativas,
      Atendidos: r.atendidos,
      Agendamentos: r.ag,
      Promessas: r.pr,
      "Sem interesse": r.si,
      Pontos: r.pontos
    }));
    const wsRank = XLSX.utils.json_to_sheet(rankRows);

    const detRows = finals.map(f=>{
      const tempoMinutos = (f.timestampFinalizacao && f.timestampDistribuicao)
        ? timeMin(f.timestampFinalizacao - f.timestampDistribuicao) : "";
      return {
        Data: f.timestampFinalizacao ? new Date(f.timestampFinalizacao).toLocaleString() : "",
        Cliente: f.nome || "",
        Telefone: f.telefone || "",
        Email: f.email || "",
        Resultado: f.resultado || "",
        "Data/Hora Agendada": f.dataAgendada || "",
        Feedback: f.observacao || "",
        "Tempo Atendimento (min)": tempoMinutos,
        Corretor: f.corretorEmail || ""
      };
    });
    const wsDet = XLSX.utils.json_to_sheet(detRows);

    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, wsResumo, "Resumo");
    XLSX.utils.book_append_sheet(wb, wsRank, "Ranking");
    XLSX.utils.book_append_sheet(wb, wsDet, "Atendidos");

    XLSX.writeFile(wb, `PROEFI_RELATORIO_${role.toUpperCase()}_${safeDe}_ATE_${safeAte}.xlsx`);

    if(box){
      box.innerHTML = `<div class="ok">Excel gerado com sucesso!</div><div class="small muted">Arquivo baixado no dispositivo.</div>`;
      if(wasClamped){
        box.innerHTML += `<div class="small muted" style="margin-top:6px">⚠️ Período maior que 7 dias foi reduzido para proteger suas leituras.</div>`;
      }
    }
  }catch(e){
    if(box){
      box.innerHTML = `<div class="errorBox">Erro ao gerar relatório:\n${safe(e.message || e.code || e)}</div>`;
    }else{
      alert(e.message || e.code || e);
    }
  }
};

window.loadTop5 = async function(){
  const box = $("top5Box") || $("resultsBox");
  if(!box) return;

  box.innerHTML = `<div class="muted">Carregando Top 5...</div>`;

  try{
    const user = auth.currentUser;
    const me = cachedUserData || await getUserDoc(user.uid);
    const equipe = me.equipe || "equipe1";
    const today = toISODateInput(nowMs());

    async function computePeriod(de, ate){
      const { finals, tries } = await fetchLeadsForPeriodNoIndex({
        scope: "diretor",
        myUser: { uid:user.uid, equipe },
        de, ate
      });

      const sbEmpresa = computeScoreboard({ finals, tries }).slice(0,5);

      const finalsEq = finals.filter(x => (x.equipe||"") === equipe);
      const triesEq  = tries.filter(x => (x.equipe||"") === equipe);
      const sbEq = computeScoreboard({ finals: finalsEq, tries: triesEq }).slice(0,5);

      const ids = [...sbEmpresa.map(x=>x.corretorId), ...sbEq.map(x=>x.corretorId)].filter(Boolean);
      const usersMap = await fetchUsersMapByIds(ids);

      return { sbEmpresa, sbEq, usersMap };
    }

    let de = today, ate = today;
    let label = "hoje";
    let data = await computePeriod(de, ate);

    if(data.sbEmpresa.length === 0 && data.sbEq.length === 0){
      de = isoDaysAgo(6);
      ate = today;
      label = `últimos 7 dias (${de} até ${ate})`;
      data = await computePeriod(de, ate);
    }

    const renderList = (arr, usersMap)=> arr.length ? `
      <div class="tableWrap" style="margin-top:10px">
        <table>
          <thead>
            <tr>
              <th>#</th><th>Corretor</th><th>Pontos</th><th>Ag</th><th>Pr</th><th>Atendidos</th><th>Tentativas</th>
            </tr>
          </thead>
          <tbody>
            ${arr.map((r,i)=>`
              <tr>
                <td><b>${i+1}</b></td>
                <td>${displayCorretorName(r, usersMap)}</td>
                <td><b>${r.pontos}</b></td>
                <td>${r.ag}</td>
                <td>${r.pr}</td>
                <td>${r.atendidos}</td>
                <td>${r.tentativas}</td>
              </tr>
            `).join("")}
          </tbody>
        </table>
      </div>
    ` : `<div class="muted">Sem dados no período.</div>`;

    box.innerHTML = `
      <div><b>Top 5 Empresa (${label})</b></div>
      ${renderList(data.sbEmpresa, data.usersMap)}
      <div style="height:14px"></div>
      <div><b>Top 5 Equipe (${equipe}) (${label})</b></div>
      ${renderList(data.sbEq, data.usersMap)}
    `;
  }catch(e){
    box.innerHTML = `<div class="errorBox">Erro ao carregar Top 5:\n${safe(e.message || e.code || e)}</div>`;
  }
};

window.prepararEmailRelatorio = async function(){
  const user = auth.currentUser;
  const me = cachedUserData || await getUserDoc(user.uid);
  const role = me.role;
  const equipe = me.equipe || "equipe1";

  let to = "";
  if(role === "corretor"){
    const gsnap = await db.collection("users")
      .where("role","==","gerente")
      .where("equipe","==",equipe)
      .where("aprovado","==",true)
      .limit(1)
      .get();
    if(gsnap.empty){
      alert("Nenhum gerente encontrado para sua equipe (ou sem aprovado).");
      return;
    }
    const gerente = gsnap.docs[0].data();
    to = gerente.emailRelatorio || gerente.email || "";
    if(!to){
      alert("Gerente sem emailRelatorio configurado.");
      return;
    }
  }else{
    to = user.email;
  }

  const today = dayKey(nowMs());
  const subject = encodeURIComponent(`PROEFI - ALVENA | Relatório | ${today}`);
  const body = encodeURIComponent(
`Olá,

Segue o relatório (gerado no PROEFI).
Perfil: ${role.toUpperCase()}
Email: ${user.email}
Equipe: ${equipe}
Data: ${today}

(Anexo: arquivo Excel gerado no PROEFI)

Att,
PROEFI - ALVENA`
  );

  window.location.href = `mailto:${encodeURIComponent(to)}?subject=${subject}&body=${body}`;
};

window.loadApprovals = async function(){
  const user = auth.currentUser;
  const me = cachedUserData || await getUserDoc(user.uid);
  const role = me.role;

  if(role !== "diretor" && role !== "gerente"){
    alert("Sem acesso.");
    return;
  }

  const list = await listPendingUsers(me);
  const box = $("approvalBox");
  if(!list.length){
    box.innerHTML = `<div class="ok">Nenhum acesso pendente.</div>`;
    return;
  }

  box.innerHTML = `
    <div class="list">
      ${list.map(u=>`
        <div class="item">
          <div class="itemTop">
            <div><b>${safe(u.nome)}</b> <span class="small muted">(${safe(u.role)})</span></div>
            <span class="pill">Equipe: ${safe(u.equipe||"equipe1")}</span>
          </div>
          <div class="small muted" style="margin-top:6px">${safe(u.email)}</div>
          <div class="divider"></div>
          <div class="grid2">
            <button class="btn btnGreen" onclick="approve('${u.uid}')">✅ APROVAR</button>
            <button class="btn btnRed" onclick="deny('${u.uid}')">⛔ NEGAR</button>
          </div>
        </div>
      `).join("")}
    </div>
  `;
};

window.approve = async function(uid){
  const user = auth.currentUser;
  const ok = await openModal("Aprovar", "Deseja aprovar este acesso?");
  if(!ok) return;
  await approveUser(uid, user);
  await loadApprovals();
};

window.deny = async function(uid){
  const ok = await openModal("Negar", "Deseja negar este acesso? (Ele continuará existindo, mas não aprovado.)");
  if(!ok) return;
  await denyUser(uid);
  await loadApprovals();
};

/** =========================
 *  BOOTSTRAP AUTH
 *  ========================= */
auth.onAuthStateChanged(async (user)=>{
  if(!user){
    cachedAuthUser = null;
    cachedUserData = null;
    leadAtualRef = null;
    leadAtualData = null;
    detailsOpen = false;
    currentTab = "painel";
    renderLogin();
    return;
  }

  cachedAuthUser = user;

  const snap = await db.collection("users").doc(user.uid).get();
  if(!snap.exists){
    await db.collection("users").doc(user.uid).set({
      email: user.email || "",
      nome: "",
      equipe: "equipe1",
      role: (String(user.email||"").toLowerCase() === MASTER_DIRECTOR_EMAIL.toLowerCase()) ? "diretor" : "corretor",
      aprovado: (String(user.email||"").toLowerCase() === MASTER_DIRECTOR_EMAIL.toLowerCase()),
      criadoEm: nowMs(),
      ativo:false,
      ativoAtualizadoEm: nowMs(),
      mensagemPadrao: "Olá {{nome}}, aqui é da equipe Alvena. Estou tentando falar com você sobre seu interesse.",
      emailRelatorio: ""
    });
  }

  cachedUserData = await getUserDoc(user.uid);

  if(String(user.email||"").toLowerCase() === MASTER_DIRECTOR_EMAIL.toLowerCase()){
    if(!cachedUserData.aprovado || cachedUserData.role !== "diretor"){
      await db.collection("users").doc(user.uid).update({ aprovado:true, role:"diretor" });
      cachedUserData = await getUserDoc(user.uid);
    }
  }

  if(!cachedUserData.aprovado){
    renderPendingApproval();
    return;
  }

  if(cachedUserData.role !== "corretor" && currentTab === "atendimento") currentTab = "painel";

  await renderAppShell();
});
