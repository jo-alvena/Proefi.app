function $(id){ return document.getElementById(id); }
function nowMs(){ return Date.now(); }
function cleanPhone(raw){ return String(raw || "").replace(/\D/g,''); }

function dayKey(ts){
  const d = new Date(ts);
  const y = d.getFullYear();
  const m = String(d.getMonth()+1).padStart(2,'0');
  const da = String(d.getDate()).padStart(2,'0');
  return `${y}-${m}-${da}`;
}

function templateMessage(msg, lead){
  const nome = lead?.nome || "";
  const tel  = lead?.telefone || "";
  const em   = lead?.email || "";
  return String(msg || "")
    .replaceAll("{{nome}}", nome)
    .replaceAll("{{telefone}}", tel)
    .replaceAll("{{email}}", em);
}

async function getUserDoc(uid){
  const snap = await db.collection("users").doc(uid).get();
  return snap.exists ? (snap.data() || null) : null;
}

function isApproved(userData){
  const st = String(userData?.status || "").toLowerCase().trim();
  if (userData?.aprovado === true) return true;
  if (userData?.approved === true) return true;
  if (st === "aprovado" || st === "approved") return true;
  return false;
}

async function ensureDiretorDoc(user){
  const ref = db.collection("users").doc(user.uid);
  const snap = await ref.get();
  const base = {
    email: user.email,
    nome: user.displayName || "Diretor",
    role: "diretor",
    status: "aprovado",
    aprovado: true,
    equipe: "DIRETORIA",
    ativo: false,
    atualizadoEm: nowMs()
  };

  if (!snap.exists){
    await ref.set({ ...base, criadoEm: nowMs() });
  } else {
    await ref.update(base);
  }
}

async function createPendingUserDoc(user){
  const ref = db.collection("users").doc(user.uid);
  const snap = await ref.get();
  if (snap.exists) return;

  await ref.set({
    email: user.email,
    nome: user.displayName || "",
    role: "corretor",
    status: "pendente",
    aprovado: false,
    equipe: null,
    ativo: false,
    criadoEm: nowMs(),
    atualizadoEm: nowMs(),
  });
}

/** =========================
 *  STATS (stats_diarios)
 *  - doc id: `${dayKey}-${uid}`
 *  ========================= */
function statsDocIdFor(uid){
  const day = dayKey(nowMs());
  return `${day}__${uid}`;
}

async function incStats(uid, patch){
  const id = statsDocIdFor(uid);
  const ref = db.collection("stats_diarios").doc(id);
  const day = dayKey(nowMs());

  const base = {
    uid,
    day,
    atualizadoEm: nowMs()
  };

  const data = {};
  for(const k of Object.keys(patch)){
    data[k] = firebase.firestore.FieldValue.increment(patch[k]);
  }

  await ref.set({ ...base, ...data }, { merge:true });
}

/** =========================
 *  Upload & Import (XLS/XLSX/CSV)
 *  ========================= */
function parseSheetRows(workbook){
  const sheetName = workbook.SheetNames[0];
  const ws = workbook.Sheets[sheetName];
  const rows = XLSX.utils.sheet_to_json(ws, { header: 1, raw: false, defval: "" });
  const clean = rows.filter(r => r && r.some(cell => String(cell).trim() !== ""));
  return clean;
}

function detectHeaderRow(rows){
  const keys = ["nome","telefone","celular","contato","email","e-mail"];
  for(let i=0;i<Math.min(5, rows.length);i++){
    const row = rows[i].map(c=>String(c).toLowerCase().trim());
    const hit = row.some(c => keys.includes(c));
    if(hit) return i;
  }
  return 0;
}

function mapLeadColumns(row){
  const nome = String(row[0] || "").trim();
  const telefone = String(row[1] || "").trim();
  const email = String(row[2] || "").trim();
  return { nome, telefone, email };
}

function makeLeadDoc(base){
  return {
    nome: base.nome || "",
    telefone: base.telefone || "",
    email: base.email || "",
    status: "fila",            // fila | em atendimento | finalizado
    corretorId: null,

    criadoEm: nowMs(),
    atualizadoEm: nowMs(),

    emAtendimentoEm: null,
    timestampDistribuicao: null,
    timestampFinalizacao: null,

    atendeu: null,
    resultado: null,
    observacao: null,
    dataAgendada: null,

    totalTentativas: 0,
    origem: null,        // geral | gerente | corretor
    equipe: null,        // string
    donoUpload: null,    // uid
    listaRef: null       // id da lista
  };
}

async function uploadLeadsFromFile({ file, origem, equipe, donoUploadUid, distribuirGeralAgora }){
  const arrayBuffer = await file.arrayBuffer();
  const workbook = XLSX.read(arrayBuffer, { type: "array" });
  const rows = parseSheetRows(workbook);
  if(rows.length === 0) throw new Error("Planilha vazia.");

  const headerIndex = detectHeaderRow(rows);
  const dataRows = rows.slice(headerIndex + 1);

  const parsed = [];
  for(const r of dataRows){
    const lead = mapLeadColumns(r);
    if(!lead.nome && !lead.telefone && !lead.email) continue;
    if(!lead.telefone) continue;
    parsed.push(lead);
  }
  if(parsed.length === 0) throw new Error("Nenhum lead válido (verifique colunas A/B/C).");

  const listaDoc = await db.collection("listas").add({
    origem,
    equipe: equipe || null,
    donoUpload: donoUploadUid,
    arquivoNome: file.name,
    total: parsed.length,
    criadoEm: nowMs()
  });
  const listaRefId = listaDoc.id;

  let corretoresAtivos = [];
  if(origem === "geral" && distribuirGeralAgora){
    const snap = await db.collection("users")
      .where("role","==","corretor")
      .where("ativo","==",true)
      .where("status","in",["aprovado","approved"]) // ajuda, mas não depende
      .get();

    // fallback se status não existir correto
    corretoresAtivos = snap.docs.map(d => ({ uid: d.id, ...(d.data()||{}) }))
      .filter(u => isApproved(u) && u.ativo === true);

    if(corretoresAtivos.length === 0){
      // tenta sem filtro de status
      const s2 = await db.collection("users")
        .where("role","==","corretor")
        .where("ativo","==",true)
        .get();
      corretoresAtivos = s2.docs.map(d=>({uid:d.id, ...(d.data()||{})})).filter(u=>u.ativo===true);
    }

    if(corretoresAtivos.length === 0){
      throw new Error("Nenhum corretor ATIVO no momento. Peça para os corretores clicarem 'ESTOU ATIVO' antes do upload da lista geral.");
    }
  }

  const batchSize = 350;
  let idx = 0;

  while(idx < parsed.length){
    const batch = db.batch();
    const slice = parsed.slice(idx, idx + batchSize);

    for(const leadBase of slice){
      const docRef = db.collection("leads").doc();
      const doc = makeLeadDoc(leadBase);

      doc.origem = origem;
      doc.equipe = equipe || null;
      doc.donoUpload = donoUploadUid;
      doc.listaRef = listaRefId;

      if(origem === "geral" && distribuirGeralAgora){
        const chosen = corretoresAtivos[Math.floor(Math.random() * corretoresAtivos.length)];
        doc.corretorId = chosen.uid;
        doc.status = "fila";
      }

      batch.set(docRef, doc);
    }

    await batch.commit();
    idx += batchSize;
  }

  return { total: parsed.length, listaRefId };
}

/** =========================
 *  Pick next lead
 *  - puxa até 10 e escolhe um diferente do lastLeadId
 *  ========================= */
async function pickNextLeadForCorretor({ source, corretorUid, equipeCorretor }){
  let q = db.collection("leads").where("status","==","fila");

  if(source === "geral"){
    q = q.where("origem","==","geral").where("corretorId","==",corretorUid);
  }else if(source === "gerente"){
    q = q.where("origem","==","gerente").where("equipe","==",equipeCorretor).where("corretorId","==",null);
  }else{
    q = q.where("origem","==","corretor").where("donoUpload","==",corretorUid).where("corretorId","==",null);
  }

  const snap = await q.limit(10).get();
  if(snap.empty) return null;

  // escolhe aleatório e evita repetir imediatamente
  const docs = snap.docs;
  let pool = docs.map(d=>d).sort(()=>Math.random()-0.5);
  let chosen = pool.find(d => d.id !== lastLeadId) || pool[0];

  const ref = chosen.ref;

  await ref.update({
    status: "em atendimento",
    corretorId: corretorUid,
    emAtendimentoEm: nowMs(),
    timestampDistribuicao: nowMs(),
    atualizadoEm: nowMs(),
    totalTentativas: firebase.firestore.FieldValue.increment(1)
  });

  const fresh = await ref.get();
  return { ref, data: fresh.data(), id: fresh.id };
}

/** =========================
 *  APROVAÇÕES (Diretor vê tudo)

async function loadAprovacoesAll(){
  const snap = await db.collection("users").get();
  const all = snap.docs.map(d => ({ id: d.id, ...(d.data()||{}) }));
  const pendentes = all.filter(u => !isApproved(u));
  return { all, pendentes };
}

    alvo.innerHTML = `
      <div class="sectionTitle">Aprovações Pendentes</div>
      <div class="small muted">Aqui aparece <b>todo mundo</b> que ainda não está aprovado.</div>
      <div class="divider"></div>
      <table>
        <thead><tr><th>Usuário</th><th>Ações</th></tr></thead>
        <tbody>${rows}</tbody>

/** =========================
 *  AÇÕES: Uploads
 *  ========================= */
window.uploadListaGeral = async function(){
  const file = $("fileDiretor")?.files?.[0];
  if(!file) return alert("Selecione um arquivo.");

  try{
    const user = auth.currentUser;
    // somente diretor por email fixo
    if((user.email||"").toLowerCase() !== DIRETOR_EMAIL_FIXO.toLowerCase()){
      return alert("Somente o Diretor (email fixo) pode subir lista geral.");
    }

    const r = await uploadLeadsFromFile({
      file,
      origem:"geral",
      equipe:null,
      donoUploadUid:user.uid,
      distribuirGeralAgora:true
    });

    alert(`Lista geral enviada! Total: ${r.total}. Distribuída para corretores ativos.`);
    $("fileDiretor").value = "";
  }catch(e){
    alert(e.message || String(e));
  }
};

window.uploadListaGerente = async function(){
  const file = $("fileGerente")?.files?.[0];
  if(!file) return alert("Selecione um arquivo.");

  try{
    const user = auth.currentUser;
    const me = await getUserDoc(user.uid);

  }catch(e){
    alert(e.message || String(e));
  }
};

window.uploadListaCorretor = async function(){

/** =========================
 *  PEGAR PRÓXIMO LEAD
 *  ========================= */
window.pegarProximoLead = async function(){
  if(leadAtualRef) return alert("Você já está com um lead em atendimento. Finalize/devolva antes de pegar outro.");

  const user = auth.currentUser;
  const me = await getUserDoc(user.uid);
  if(!me) return alert("Usuário não encontrado em users.");
  if(me.ativo !== true) return alert("Você está PAUSADO. Clique em 'ESTOU ATIVO' para pegar lead.");

  const source = $("leadSource").value;
  const equipe = me.equipe || "equipe1";

  const picked = await pickNextLeadForCorretor({
    source,
    corretorUid: user.uid,
    equipeCorretor: equipe
  });

  if(!picked){
    alert("Sem leads disponíveis nessa fonte.");
    return;
  }

  leadAtualRef = picked.ref;
  leadAtualData = picked.data;
  lastLeadId = picked.id;
  detailsOpen = false;

  // stats: tentativa
  await incStats(user.uid, { tentativas: 1 });

  await renderLeadInArea();
};

  const msgBase  = me.mensagemPadrao || "";
  const msgFinal = encodeURIComponent(templateMessage(msgBase, lead));

  const disabled = me.ativo !== true ? "disabled" : "";

  area.innerHTML = `
    <div><b>${lead.nome || "Sem nome"}</b></div>
    <div class="small muted">${lead.telefone || ""} • ${lead.email || ""}</div>

    <div class="divider"></div>

      </a>

/** =========================
 *  NÃO ATENDEU
 *  - devolve pra fila
 *  - já puxa outro lead (sem repetir imediato)
 *  ========================= */
window.uiNaoAtendeu = async function(){
  if(!leadAtualRef) return;

  const user = auth.currentUser;
  const me = await getUserDoc(user.uid);
  if(!me) return;

  // devolve lead
  await leadAtualRef.update({
    status: "fila",
    // se veio da lista geral, mantém corretorId pra voltar pra ele, como combinado
    corretorId: (leadAtualData.origem === "geral") ? user.uid : null,
    emAtendimentoEm: null,
    timestampDistribuicao: null,
    timestampFinalizacao: null,
    atendeu: false,
    resultado: null,
    observacao: null,
    dataAgendada: null,
    atualizadoEm: nowMs()
  });

  // stats: nao atendeu
  await incStats(user.uid, { nao_atendeu: 1 });

  // limpa atual
  leadAtualRef = null;
  leadAtualData = null;
  detailsOpen = false;

  // já pega outro
  try{
    const source = $("leadSource").value;
    const equipe = me.equipe || "equipe1";

    const picked = await pickNextLeadForCorretor({
      source,
      corretorUid: user.uid,
      equipeCorretor: equipe
    });

    if(!picked){
      $("leadArea").innerHTML = `<div class="center muted">Lead devolvido. Sem outros leads disponíveis agora.</div>`;
      return;
    }

    leadAtualRef = picked.ref;
    leadAtualData = picked.data;
    // garante que não repita imediatamente
    lastLeadId = picked.id;
    detailsOpen = false;

    await incStats(user.uid, { tentativas: 1 });
    await renderLeadInArea();
  }catch(e){
    $("leadArea").innerHTML = `<div class="center muted">Lead devolvido. Erro ao pegar outro: ${String(e.message||e)}</div>`;
  }
};

 *  ATENDEU -> escolha finalização

    <button class="btn btnGold" onclick="uiAgendamento()">📅 AGENDAMENTO</button>

    <button class="btn btnGold" onclick="uiPromessa()">PROMESSA DE DOCUMENTAÇÃO</button>
    <div style="height:8px"></div>

    <textarea id="obsPr" placeholder="Ex: vai enviar docs amanhã..."></textarea>
    <button class="btn btnGreen" onclick="confirmarAtendeu('PROMESSA DOCUMENTAÇÃO')">CONFIRMAR</button>

};

window.uiSemInteresse = function(){
  $("extraBox").innerHTML = `
    <div class="divider"></div>
    <div class="fieldLabel">Feedback obrigatório</div>
    <textarea id="fb" placeholder="Motivo / objeção / próximo passo..."></textarea>
    <button class="btn btnGreen" onclick="confirmarAtendeu('NÃO GEROU INTERESSE')">CONFIRMAR</button>
  `;
};

window.confirmarAtendeu = async function(resultado){
  if(!leadAtualRef) return;

  let dataAgendada = null;
  let obs = null;

  if(resultado === "AGENDAMENTO"){
    const d = ($("agData")?.value || "").trim();
    const h = ($("agHora")?.value || "").trim();
    if(!d || !h) return alert("Preencha data e horário do agendamento.");
    dataAgendada = `${d} ${h}`;
    obs = ($("obsAg")?.value || "").trim();
  }else if(resultado === "PROMESSA DOCUMENTAÇÃO"){
    obs = ($("obsPr")?.value || "").trim();
  }else{
    const fb = ($("fb")?.value || "").trim();
    if(!fb) return alert("Feedback é obrigatório.");
    obs = fb;
  }

  await leadAtualRef.update({
    status: "finalizado",
    atendeu: true,
    resultado,
    observacao: obs || null,
    dataAgendada: dataAgendada,
    timestampFinalizacao: nowMs(),
    atualizadoEm: nowMs()
  });

  const user = auth.currentUser;

  // stats: atendidos e resultado
  await incStats(user.uid, { atendidos: 1 });
  if(resultado === "AGENDAMENTO") await incStats(user.uid, { agendamentos: 1 });
  if(resultado === "PROMESSA DOCUMENTAÇÃO") await incStats(user.uid, { promessas: 1 });
  if(resultado === "NÃO GEROU INTERESSE") await incStats(user.uid, { sem_interesse: 1 });

  leadAtualRef = null;
  leadAtualData = null;
  detailsOpen = false;

  $("leadArea").innerHTML = `<div class="center ok">Atendimento finalizado!</div>`;
};

/** =========================
 *  RELATÓRIO Excel + Email
 *  ========================= */
window.gerarRelatorioExcel = async function(){
  const user = auth.currentUser;
  const me = await getUserDoc(user.uid);
  if(!me || String(me.role).toLowerCase() !== "corretor") return;

  const snap = await db.collection("leads").where("corretorId","==",user.uid).get();
  if(snap.empty) return alert("Sem registros para relatório.");

  const today = dayKey(nowMs());

  let totalLigacoes = 0;
  let totalNaoAtendeu = 0;
  let totalAtendidos = 0;
  let totalAgend = 0;
  let totalPromessa = 0;
  let totalSemInteresse = 0;

  const atendidosRows = [];

  snap.forEach(ds=>{
    const d = ds.data() || {};

    if(d.timestampDistribuicao && dayKey(d.timestampDistribuicao) === today){
      totalLigacoes += 1;
    }
    if(d.atendeu === false && d.atualizadoEm && dayKey(d.atualizadoEm) === today){
      totalNaoAtendeu += 1;
    }

    if(d.atendeu === true && d.timestampFinalizacao && dayKey(d.timestampFinalizacao) === today){
      totalAtendidos += 1;
      if(d.resultado === "AGENDAMENTO") totalAgend += 1;
      else if(d.resultado === "PROMESSA DOCUMENTAÇÃO") totalPromessa += 1;
      else if(d.resultado === "NÃO GEROU INTERESSE") totalSemInteresse += 1;

      const tempoMin = (d.timestampFinalizacao && d.timestampDistribuicao)
        ? Math.max(0, Math.floor((d.timestampFinalizacao - d.timestampDistribuicao)/60000))
        : "";

      atendidosRows.push({
        Cliente: d.nome || "",
        Telefone: d.telefone || "",
        Email: d.email || "",
        Resultado: d.resultado || "",
        "Data/Hora Agendada": d.dataAgendada || "",
        Feedback: d.observacao || "",
        "Tempo Atendimento (min)": tempoMin
      });
    }
  });

  const tempoLogadoMin = loginTimestamp ? Math.max(0, Math.floor((nowMs()-loginTimestamp)/60000)) : 0;

  const resumo = [
    ["Operador", user.email],
    ["Equipe", me.equipe || ""],
    ["Tempo total logado (min)", tempoLogadoMin],
    ["Total de ligações (tentativas)", totalLigacoes],
    ["Total NÃO atendeu", totalNaoAtendeu],
    ["Total ATENDIDOS", totalAtendidos],
    ["Agendamentos", totalAgend],
    ["Promessa documentação", totalPromessa],
    ["Não gerou interesse", totalSemInteresse],
    ["Data", today]
  ];

  const wsResumo = XLSX.utils.aoa_to_sheet(resumo);
  const wsAtend  = XLSX.utils.json_to_sheet(atendidosRows);

  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, wsResumo, "Resumo");
  XLSX.utils.book_append_sheet(wb, wsAtend, "Atendidos");

  XLSX.writeFile(wb, `PROEFI_RELATORIO_${today}.xlsx`);
  alert("Relatório Excel gerado (baixado no dispositivo).");
};

window.prepararEmailRelatorio = async function(){
  const user = auth.currentUser;
  const me = await getUserDoc(user.uid);
  if(!me || String(me.role).toLowerCase() !== "corretor") return;

  const equipe = me.equipe || "equipe1";
  const gsnap = await db.collection("users")
    .where("role","==","gerente")
    .where("equipe","==",equipe)
    .limit(1)
    .get();

  if(gsnap.empty){
    alert("Nenhum gerente encontrado para sua equipe.");
    return;
  }

  const gerente = gsnap.docs[0].data() || {};
  const to = (gerente.emailRelatorio || gerente.email || "").trim();
  if(!to){
    alert("Gerente sem email configurado.");
    return;
  }

  const today = dayKey(nowMs());
  const subject = encodeURIComponent(`PROEFI - ALVENA | Relatório do Operador | ${today}`);
  const body = encodeURIComponent(
`Olá, gerente.

Segue o relatório do operador:
Operador: ${user.email}
Equipe: ${equipe}
Data: ${today}

(Anexo: arquivo Excel gerado no PROEFI)

Att,
PROEFI - ALVENA`
  );

  window.location.href = `mailto:${encodeURIComponent(to)}?subject=${subject}&body=${body}`;
};

/** =========================
 *  BOOTSTRAP (AQUI ESTÁ A CORREÇÃO DEFINITIVA)
 *  ========================= */
auth.onAuthStateChanged(async (user) => {
  try{
    if(!user){
      renderLogin();
      return;
    }

    const emailLower = String(user.email || "").toLowerCase();

    // ✅ DIRETOR BYPASS TOTAL por email fixo
    if(emailLower === DIRETOR_EMAIL_FIXO.toLowerCase()){
      await ensureDiretorDoc(user);
      const diretorData = await getUserDoc(user.uid);
      renderDiretor(user, diretorData || {});
      return;
    }

    // fluxo normal
    const snap = await db.collection("users").doc(user.uid).get();
    if(!snap.exists){
      await createPendingUserDoc(user);
      renderPendingApproval();
      return;
    }

    const data = snap.data() || {};
    if(!isApproved(data)){
      renderPendingApproval();
      return;
    }

    const role = String(data.role || "corretor").toLowerCase();
    if(role === "gerente") renderGerente(user, data);
    else if(role === "diretor") renderDiretor(user, data);
    else renderCorretor(user, data);

  }catch(e){
    $("app").innerHTML = `
      <div class="brand">
        <h1>PROEFI - ALVENA</h1>
        <div class="sub">Produção Eficiente<br/>Alvena Soluções Imobiliárias</div>
      </div>
      <div class="card">
        <div class="danger">Erro ao carregar:</div>
        <div class="divider"></div>
        <div class="small">${String(e.message || e)}</div>
        <div class="divider"></div>
        <button class="btn btnGold" onclick="auth.signOut()">SAIR</button>
      </div>
    `;
  }
});
</script>
