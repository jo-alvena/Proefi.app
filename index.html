<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>PROEFI - ALVENA</title>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>
:root{
 --blue:#21346C;
 --gold:#BC8A0B;
 --white:#fff;
 --green:#B9F6CA;
 --red:#FFCCCB;
}
body{
 margin:0;
 font-family:Arial;
 background:var(--blue);
 color:white;
}
.wrap{max-width:520px;margin:auto;padding:12px;}
.card{
 background:white;
 color:#21346C;
 border-radius:12px;
 padding:12px;
 margin-bottom:10px;
}
.btn{
 width:100%;
 padding:12px;
 border:none;
 border-radius:10px;
 font-weight:700;
 margin-top:8px;
}
.btnGold{background:var(--gold);color:white;}
.btnBlue{background:var(--blue);color:white;}
.btnGreen{background:var(--green);}
.btnRed{background:var(--red);}
.menu{
 position:fixed;
 bottom:0;left:0;right:0;
 background:#fff;
 display:flex;
 justify-content:space-around;
 border-top:1px solid #ddd;
}
.menu button{
 flex:1;
 border:none;
 background:white;
 padding:12px;
 font-weight:bold;
}
.hidden{display:none;}
h2{margin:4px 0;}
.small{font-size:12px;opacity:.7}
</style>
</head>

<body>
<div class="wrap" id="app">Carregando...</div>

<script>
/* ================= FIREBASE ================= */
const firebaseConfig={
 apiKey:"AIzaSyAPO-xtmzg0QMvSoDfHd6nRcmrDb7F8n6k",
 authDomain:"proefi-alvena.firebaseapp.com",
 projectId:"proefi-alvena",
 storageBucket:"proefi-alvena.firebasestorage.app",
 messagingSenderId:"1084612497727",
 appId:"1:1084612497727:web:d9b1de2962cce8123b038a"
};
firebase.initializeApp(firebaseConfig);
const auth=firebase.auth();
const db=firebase.firestore();

/* ================= STATE ================= */
let userData=null;
let leadAtual=null;
let loginStart=Date.now();
let currentTab="painel";

/* ================= HELPERS ================= */
function $(id){return document.getElementById(id);}
function cleanPhone(v){return String(v||"").replace(/\D/g,"");}
function now(){return Date.now();}

function msgTemplate(msg,lead){
 return msg
  .replaceAll("{{nome}}",lead.nome||"")
  .replaceAll("{{telefone}}",lead.telefone||"")
  .replaceAll("{{email}}",lead.email||"");
}

/* ================= LOGIN ================= */
function renderLogin(){
 $("app").innerHTML=`
 <div style="text-align:center;margin-top:20px">
   <h2 style="color:#BC8A0B">PROEFI - ALVENA</h2>
   <div>Produção Eficiente<br/>Alvena Soluções Imobiliárias</div>
 </div>
 <div class="card">
   <input id="email" placeholder="Email"/><br/><br/>
   <input id="senha" type="password" placeholder="Senha"/>
   <button class="btn btnGold" onclick="doLogin()">ENTRAR</button>
 </div>`;
}

async function doLogin(){
 try{
  await auth.signInWithEmailAndPassword(
   $("email").value,
   $("senha").value
  );
 }catch(e){alert(e.message);}
}
window.doLogin=doLogin;

/* ================= MENU APP ================= */
function renderApp(){
 $("app").innerHTML=`
 <div id="view"></div>

 <div class="menu">
   <button onclick="goTab('painel')">🏠</button>
   <button onclick="goTab('atendimento')">☎️</button>
   <button onclick="goTab('resultados')">📊</button>
   <button onclick="goTab('config')">⚙️</button>
 </div>
 `;
 goTab("painel");
}

function goTab(tab){
 currentTab=tab;
 if(tab==="painel") renderPainel();
 if(tab==="atendimento") renderAtendimento();
 if(tab==="resultados") renderResultados();
 if(tab==="config") renderConfig();
}
window.goTab=goTab;

/* ================= PAINEL ================= */
async function renderPainel(){

 const ativo=userData.ativo?"🟢 ATIVO":"🔴 PAUSADO";

 $("view").innerHTML=`
 <div class="card">
   <h2>Painel</h2>
   <div>${ativo}</div>
   <div class="small">Tempo logado: <span id="tempoLogado"></span></div>
   <button class="btn btnGreen" onclick="setAtivo(true)">ESTOU ATIVO</button>
   <button class="btn btnRed" onclick="setAtivo(false)">PAUSAR</button>
 </div>

 <div class="card">
   <h2>Mini CRM - Hoje</h2>
   <div id="statsHoje">Carregando...</div>
 </div>

 <div class="card">
   <button class="btn btnGold" onclick="goTab('atendimento')">
   IR PARA ATENDIMENTO
   </button>
 </div>
 `;

 startTimer();
 carregarStatsHoje();
}

function startTimer(){
 setInterval(()=>{
  const min=Math.floor((Date.now()-loginStart)/60000);
  if($("tempoLogado")) $("tempoLogado").innerText=min+" min";
 },1000);
}

async function setAtivo(v){
 await db.collection("users").doc(auth.currentUser.uid)
 .update({ativo:v});
 userData.ativo=v;
 renderPainel();
}
window.setAtivo=setAtivo;

/* ================= STATS ================= */
async function carregarStatsHoje(){
 const key=new Date().toISOString().slice(0,10);
 const doc=await db.collection("stats_diarios")
 .doc(key+"_"+auth.currentUser.uid).get();

 let d=doc.exists?doc.data():{};
 $("statsHoje").innerHTML=`
 📞 Ligações: ${d.ligacoes||0}<br>
 🟢 Atendidos: ${d.atendidos||0}<br>
 📅 Agendamentos: ${d.agendamentos||0}<br>
 📂 Promessas: ${d.promessas||0}
 `;
}

/* ================= ATENDIMENTO ================= */
async function renderAtendimento(){

 $("view").innerHTML=`
 <div class="card">
   <h2>Atendimento</h2>
   <button class="btn btnGold" onclick="pegarLead()">PEGAR PRÓXIMO LEAD</button>
   <div id="leadBox" style="margin-top:10px"></div>
 </div>
 `;
}

async function pegarLead(){

 const snap=await db.collection("leads")
 .where("status","==","fila")
 .limit(1).get();

 if(snap.empty){
  $("leadBox").innerHTML="Sem leads.";
  return;
 }

 const doc=snap.docs[0];
 leadAtual={id:doc.id,...doc.data()};

 await doc.ref.update({
  status:"em atendimento",
  corretorId:auth.currentUser.uid,
  timestampDistribuicao:now()
 });

 renderLead();
}

function renderLead(){

 const msg=msgTemplate(userData.mensagemPadrao||"",leadAtual);
 const tel=cleanPhone(leadAtual.telefone);

 $("leadBox").innerHTML=`
 <h3>${leadAtual.nome}</h3>
 <div>${leadAtual.telefone}</div>
 <div class="small">${leadAtual.email||""}</div>

 <a href="tel:${tel}"><button class="btn btnBlue">📞 LIGAR</button></a>
 <a href="https://wa.me/55${tel}?text=${encodeURIComponent(msg)}" target="_blank">
   <button class="btn btnBlue">💬 WHATSAPP</button>
 </a>

 <button class="btn btnGreen" onclick="finalizar('AGENDAMENTO')">ATENDEU - AGENDAMENTO</button>
 <button class="btn btnGold" onclick="finalizar('PROMESSA')">ATENDEU - PROMESSA</button>
 <button class="btn btnRed" onclick="naoAtendeu()">NÃO ATENDEU</button>
 `;
}

async function naoAtendeu(){
 await db.collection("leads").doc(leadAtual.id).update({
  status:"fila",
  corretorId:null
 });
 leadAtual=null;
 renderAtendimento();
}
window.naoAtendeu=naoAtendeu;

async function finalizar(tipo){

 const ref=db.collection("leads").doc(leadAtual.id);

 await ref.update({
  status:"finalizado",
  resultado:tipo,
  atendeu:true,
  timestampFinalizacao:now()
 });

 await registrarEvento(tipo);

 leadAtual=null;
 renderAtendimento();
}
window.finalizar=finalizar;

/* ================= EVENTS + STATS ================= */
async function registrarEvento(tipo){

 const uid=auth.currentUser.uid;
 const hoje=new Date().toISOString().slice(0,10);
 const statId=hoje+"_"+uid;

 await db.collection("events").add({
  tipo,
  uid,
  timestamp:now()
 });

 const ref=db.collection("stats_diarios").doc(statId);

 await db.runTransaction(async t=>{
  const doc=await t.get(ref);
  let d=doc.exists?doc.data():{
   ligacoes:0,atendidos:0,agendamentos:0,promessas:0
  };

  d.ligacoes++;
  d.atendidos++;

  if(tipo==="AGENDAMENTO") d.agendamentos++;
  if(tipo==="PROMESSA") d.promessas++;

  t.set(ref,d);
 });
}

/* ================= RESULTADOS ================= */
function renderResultados(){
 $("view").innerHTML=`
 <div class="card">
   <h2>Resultados</h2>
   <div>Mini CRM do dia já aparece no painel.</div>
 </div>`;
}

/* ================= CONFIG ================= */
function renderConfig(){
 $("view").innerHTML=`
 <div class="card">
   <h2>Mensagem padrão</h2>
   <textarea id="msg" style="width:100%;height:90px">${userData.mensagemPadrao||""}</textarea>
   <button class="btn btnBlue" onclick="salvarMsg()">SALVAR</button>
 </div>
 `;
}
window.salvarMsg=async function(){
 const msg=$("msg").value;
 await db.collection("users").doc(auth.currentUser.uid)
 .update({mensagemPadrao:msg});
 userData.mensagemPadrao=msg;
 alert("Mensagem salva");
}

/* ================= AUTH ================= */
auth.onAuthStateChanged(async u=>{
 if(!u){renderLogin();return;}

 const doc=await db.collection("users").doc(u.uid).get();
 if(!doc.exists){alert("Usuário não autorizado");auth.signOut();return;}

 userData=doc.data();
 renderApp();
});
</script>
</body>
</html>
