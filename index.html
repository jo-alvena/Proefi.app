function dayKey(ts){

  const y = d.getFullYear();
  const m = String(d.getMonth()+1).padStart(2,'0');
  const da = String(d.getDate()).padStart(2,'0');
  return `${y}-${m}-${da}`;
}

/** =========================
 *  Upload & Import (XLS/XLSX/CSV)
 *  ========================= */
function parseSheetRows(workbook){
  const sheetName = workbook.SheetNames[0];
  const ws = workbook.Sheets[sheetName];
  const rows = XLSX.utils.sheet_to_json(ws, { header: 1, raw: false, defval: "" });
  const clean = rows.filter(r => r && r.some(cell => String(cell).trim() !== ""));
  return clean;
}

function detectHeaderRow(rows){
  const keys = ["nome","telefone","celular","contato","email","e-mail"];
  for(let i=0;i<Math.min(5, rows.length);i++){
    const row = rows[i].map(c=>String(c).toLowerCase().trim());
    const hit = row.some(c => keys.includes(c));
    if(hit) return i;
  }
  return 0;
}

function mapLeadColumns(row){
  const nome = String(row[0] || "").trim();
  const telefone = String(row[1] || "").trim();
  const email = String(row[2] || "").trim();
  return { nome, telefone, email };
}

function makeLeadDoc(base){
  return {
    nome: base.nome || "",
    telefone: base.telefone || "",
    email: base.email || "",
    status: "fila",
    corretorId: null,
    criadoEm: nowMs(),
    atualizadoEm: nowMs(),
    emAtendimentoEm: null,
    timestampDistribuicao: null,
    timestampFinalizacao: null,
    atendeu: null,
    resultado: null,
    observacao: null,
    dataAgendada: null,
    totalTentativas: 0,
    ultimoNaoAtendeuPor: null,
    ultimoNaoAtendeuEm: null,
    origem: null,
    equipe: null,
    donoUpload: null,
    listaRef: null
  };
}

async function uploadLeadsFromFile({ file, origem, equipe, donoUploadUid, distribuirGeralAgora }){
  const arrayBuffer = await file.arrayBuffer();
  const workbook = XLSX.read(arrayBuffer, { type: "array" });
  const rows = parseSheetRows(workbook);
  if(rows.length === 0) throw new Error("Planilha vazia.");

  const headerIndex = detectHeaderRow(rows);
  const dataRows = rows.slice(headerIndex + 1);

  const parsed = [];
  for(const r of dataRows){
    const lead = mapLeadColumns(r);
    if(!lead.nome && !lead.telefone && !lead.email) continue;
    if(!lead.telefone) continue;
    parsed.push(lead);
  }
  if(parsed.length === 0) throw new Error("Nenhum lead válido (verifique colunas A/B/C).");

  const listaDoc = await db.collection("listas").add({
    origem,
    equipe: equipe || null,
    donoUpload: donoUploadUid,
    arquivoNome: file.name,
    total: parsed.length,
    criadoEm: nowMs()
  });
  const listaRefId = listaDoc.id;

  let corretoresAtivos = [];
  if(origem === "geral" && distribuirGeralAgora){
    const snap = await db.collection("users")
      .where("role","==","corretor")
      .where("ativo","==",true)
      .get();
    corretoresAtivos = snap.docs.map(d => ({ uid: d.id, ...d.data() }));
    if(corretoresAtivos.length === 0){
      throw new Error("Nenhum corretor ATIVO no momento. Peça para os corretores clicarem 'ESTOU ATIVO' antes do upload da lista geral.");
    }
  }

  const batchSize = 400;
  let idx = 0;

  while(idx < parsed.length){
    const batch = db.batch();
    const slice = parsed.slice(idx, idx + batchSize);

    for(const leadBase of slice){
      const docRef = db.collection("leads").doc();
      const doc = makeLeadDoc(leadBase);

      doc.origem = origem;
      doc.equipe = equipe || null;
      doc.donoUpload = donoUploadUid;
      doc.listaRef = listaRefId;

      if(origem === "geral" && distribuirGeralAgora){
        const chosen = corretoresAtivos[Math.floor(Math.random() * corretoresAtivos.length)];
        doc.corretorId = chosen.uid;
        doc.status = "fila";
      }

      batch.set(docRef, doc);
    }

    await batch.commit();
    idx += batchSize;
  }

  return { total: parsed.length, listaRefId };
}

/** =========================
 *  Lead selection per source
 *  ========================= */
async function pickNextLeadForCorretor({ source, corretorUid, equipeCorretor }){
  let q = db.collection("leads").where("status","==","fila");

  if(source === "geral"){
    q = q.where("origem","==","geral").where("corretorId","==",corretorUid);
  }else if(source === "gerente"){
    q = q.where("origem","==","gerente").where("equipe","==",equipeCorretor).where("corretorId","==",null);
  }else{
    q = q.where("origem","==","corretor").where("donoUpload","==",corretorUid).where("corretorId","==",null);
  }

  const snap = await q.limit(12).get();
  if(snap.empty) return null;

  const now = nowMs();
  const candidates = snap.docs.filter(doc => {
    if(doc.id === lastLeadId) return false;
    const d = doc.data() || {};
    if(d.ultimoNaoAtendeuPor === corretorUid && d.ultimoNaoAtendeuEm && (now - d.ultimoNaoAtendeuEm) < NAO_ATENDEU_COOLDOWN_MS){
      return false;
    }
    return true;
  });

  const chosenSnap = (candidates.length > 0)
    ? candidates[Math.floor(Math.random() * candidates.length)]
    : snap.docs[0];

  const ref = chosenSnap.ref;

  await ref.update({
    status: "em atendimento",
    corretorId: corretorUid,
    emAtendimentoEm: nowMs(),
    timestampDistribuicao: nowMs(),
    atualizadoEm: nowMs(),
    totalTentativas: firebase.firestore.FieldValue.increment(1)
  });

  const fresh = await ref.get();
  lastLeadId = fresh.id;
  return { ref, data: fresh.data() };
}

/** =========================
 *  Stats / Ranking
 *  ========================= */
async function bumpStats({ uid, equipe, email, tipo }){
  const dk = dayKey(nowMs());
  const docId = `${dk}_${uid}`;
  const ref = db.collection("stats_diarios").doc(docId);

  await db.runTransaction(async (t)=>{
    const snap = await t.get(ref);
    const base = snap.exists ? snap.data() : {
      dateKey: dk,
      uid,
      email: email || "",
      equipe: equipe || null,
      ligacoes: 0,
      naoAtendeu: 0,
      atendidos: 0,
      agendamentos: 0,
      promessas: 0,
      semInteresse: 0,
      atualizadoEm: nowMs()
    };

    if(tipo==="LIGACAO") base.ligacoes = (base.ligacoes||0) + 1;
    if(tipo==="NAO_ATENDEU") base.naoAtendeu = (base.naoAtendeu||0) + 1;

    if(tipo==="AGENDAMENTO"){
      base.atendidos = (base.atendidos||0) + 1;
      base.agendamentos = (base.agendamentos||0) + 1;
    }
    if(tipo==="PROMESSA"){
      base.atendidos = (base.atendidos||0) + 1;
      base.promessas = (base.promessas||0) + 1;
    }
    if(tipo==="SEM_INTERESSE"){
      base.atendidos = (base.atendidos||0) + 1;
      base.semInteresse = (base.semInteresse||0) + 1;
    }

    base.atualizadoEm = nowMs();
    t.set(ref, base, { merge:true });
  });
}

async function loadMyStats(){

async function computeRankingEquipeForCorretor(){
  const dk = dayKey(nowMs());
  const equipe = currentUserData?.equipe || null;
  if(!equipe) return { pos: "-", total: "-" };

  const snap = await db.collection("stats_diarios")
    .where("dateKey","==",dk)
    .where("equipe","==",equipe)
    .get();

  if(snap.empty) return { pos: "-", total: "-" };

  const list = snap.docs.map(d => d.data());
  list.sort((a,b)=> (b.atendidos||0) - (a.atendidos||0));

  const idx = list.findIndex(x => x.uid === currentUser.uid);
  return { pos: idx>=0 ? (idx+1) : "-", total: list.length };
}

async function getEquipeStatsHoje(equipe){
  const dk = dayKey(nowMs());
  const snap = await db.collection("stats_diarios")
    .where("dateKey","==",dk)
    .where("equipe","==",equipe)
    .get();

  const list = snap.docs.map(d=>d.data());
  // total equipe
  const total = list.reduce((acc, x)=>{
    acc.ligacoes += (x.ligacoes||0);
    acc.naoAtendeu += (x.naoAtendeu||0);
    acc.atendidos += (x.atendidos||0);
    acc.agendamentos += (x.agendamentos||0);
    acc.promessas += (x.promessas||0);
    acc.semInteresse += (x.semInteresse||0);
    return acc;
  }, { ligacoes:0, naoAtendeu:0, atendidos:0, agendamentos:0, promessas:0, semInteresse:0 });

  // ranking corretor
  list.sort((a,b)=> (b.atendidos||0) - (a.atendidos||0));
  return { list, total };
}

async function aprovarUsuario({ uid, roleFinal, equipeFinal }){
  await db.collection("users").doc(uid).update({
    role: roleFinal,
    equipe: equipeFinal || null,
    aprovado: true,
    aprovadoEm: nowMs(),
    aprovadoPor: currentUser.uid
  });
}

async function rejeitarUsuario({ uid }){
  await db.collection("users").doc(uid).update({
    role: "rejeitado",
    aprovado: false,
    rejeitadoEm: nowMs(),
    rejeitadoPor: currentUser.uid
  });
}

async function hydrateDiretor(){
  // totais geral
  const geral = await getGeralHoje();
  $("totaisGeral").innerHTML = `
    <div><b>Total geral hoje</b></div>
    <div>📞 Ligações: <b>${geral.total.ligacoes}</b></div>
    <div>🔴 Não atendeu: <b>${geral.total.naoAtendeu}</b></div>
    <div>🟢 Atendidos: <b>${geral.total.atendidos}</b></div>
    <div>📅 Agendamentos: <b>${geral.total.agendamentos}</b></div>
    <div>📂 Promessas: <b>${geral.total.promessas}</b></div>
    <div>❌ Sem interesse: <b>${geral.total.semInteresse}</b></div>
  `;

  // ranking gerentes (por equipe)
  const gerSnap = await db.collection("users").where("role","==","gerente").get();
  const gerentes = gerSnap.docs.map(d=>({ uid:d.id, ...d.data() }));

  const rows = [];
  for(const g of gerentes){
    const equipe = g.equipe || null;
    if(!equipe) continue;
    const eq = await getEquipeStatsHoje(equipe);
    rows.push({
      gerente: g.nome || g.email || g.uid,
      equipe,
      atendidos: eq.total.atendidos,
      ligacoes: eq.total.ligacoes,
      agendamentos: eq.total.agendamentos,
      promessas: eq.total.promessas
    });
  }

  rows.sort((a,b)=> (b.atendidos||0) - (a.atendidos||0));

  if(rows.length === 0){
    $("rankingGerentes").innerHTML = `<div class="muted">Sem dados ainda hoje.</div>`;
  }else{
    $("rankingGerentes").innerHTML = rows.map((r,i)=>`
      <div class="listItem">
        <div><b>${i+1}º</b> • ${r.gerente} <span class="pill">Equipe: ${r.equipe}</span></div>
        <div class="small muted">🟢 Atendidos: <b>${r.atendidos}</b> • 📞 Ligações: <b>${r.ligacoes}</b></div>
        <div class="small muted">📅 Agend: <b>${r.agendamentos}</b> • 📂 Promessas: <b>${r.promessas}</b></div>
      </div>
    `).join("");
  }

  // pendentes
  const pend = await fetchPendentes({ scopeEquipe:null });
  if(pend.length === 0){
    $("pendentesDiretor").innerHTML = `<div class="muted">Nenhum pendente.</div>`;
  }else{
    $("pendentesDiretor").innerHTML = pend.map(p=>`
      <div class="listItem">
        <div><b>${p.nome || p.email}</b></div>
        <div class="small muted">${p.email || ""}</div>
        <div class="small muted">Equipe: <b>${p.equipe || "-"}</b> • Solicitado: <b>${(p.solicitadoRole||"corretor").toUpperCase()}</b></div>
        <div class="divider"></div>
        <div class="grid2">
          <button class="btn btnGreen" onclick="aprovarPendenteDiretor('${p.id}')">APROVAR</button>
          <button class="btn btnRed" onclick="rejeitarPendente('${p.id}')">REJEITAR</button>
        </div>
      </div>
    `).join("");
  }
}

window.aprovarPendenteDiretor = async function(uid){
  const u = await db.collection("users").doc(uid).get();
  if(!u.exists) return alert("Usuário não encontrado.");
  const data = u.data() || {};
  const roleFinal = data.solicitadoRole || "corretor";
  const equipeFinal = data.equipe || null;
  await aprovarUsuario({ uid, roleFinal, equipeFinal });
  alert("Aprovado!");
  hydrateDiretor();
};

window.rejeitarPendente = async function(uid){
  await rejeitarUsuario({ uid });
  alert("Rejeitado!");
  if(currentUserData?.role === "diretor") hydrateDiretor();
  if(currentUserData?.role === "gerente") hydrateGerente();
};

window.uploadListaGeral = async function(){
  const file = $("fileDiretor")?.files?.[0];
  if(!file) return alert("Selecione um arquivo.");
  try{
    const r = await uploadLeadsFromFile({
      file, origem:"geral", equipe:null, donoUploadUid:currentUser.uid, distribuirGeralAgora:true
    });
    alert(`Lista geral enviada! Total: ${r.total}. Distribuída para corretores ativos.`);
    $("fileDiretor").value = "";
    hydrateDiretor();
  }catch(e){
    alert(e.message);
  }
};

};

window.pegarProximoLead = async function(){
  if(leadAtualRef) return alert("Você já está com um lead em atendimento. Finalize antes de pegar outro.");

  const source = $("leadSource") ? $("leadSource").value : "geral";
  const equipe = currentUserData?.equipe || "equipe1";

  const picked = await pickNextLeadForCorretor({
    source, corretorUid: currentUser.uid, equipeCorretor: equipe
  });

  if(!picked){
    alert("Sem leads disponíveis nessa fonte.");
    return;
  }

  leadAtualRef = picked.ref;
  leadAtualData = picked.data;
  detailsOpen = false;
  toggleMode = null;

  await bumpStats({ uid:currentUser.uid, equipe, email:currentUser.email, tipo:"LIGACAO" });
  await renderLeadInArea();
};

async function renderLeadInArea(){
  const lead = leadAtualData;
  const area = $("leadArea");

  const snap = await db.collection("users").doc(currentUser.uid).get();
  const userAtual = snap.exists ? (snap.data() || {}) : {};

  const telClean = cleanPhone(lead.telefone);
  const msgBase  = userAtual.mensagemPadrao || "";
  const msgFinal = encodeURIComponent(templateMessage(msgBase, lead));

  area.innerHTML = `
    <div><b>${lead.nome || "Sem nome"}</b></div>
    <div class="small muted">${lead.telefone || ""} • ${lead.email || ""}</div>
    <div class="divider"></div>

    <div class="grid3">
      <a href="tel:${telClean}"><button class="btn btnBlue">📞 LIGAR</button></a>
      <a href="sms:${telClean}?body=${msgFinal}"><button class="btn btnBlue">📩 SMS</button></a>
      <a href="mailto:${encodeURIComponent(lead.email || "")}?subject=${encodeURIComponent("PROEFI - ALVENA")}&body=${msgFinal}">
        <button class="btn btnBlue">📧 EMAIL</button>
      </a>
    </div>

    <a href="https://wa.me/55${telClean}?text=${msgFinal}" target="_blank">
      <button class="btn btnBlue" style="margin-top:10px">💬 WHATSAPP</button>
    </a>

    <div class="divider"></div>

    <div class="grid2">
      <button class="btn btnGreen" onclick="uiAtendeu()">ATENDEU</button>
      <button class="btn btnRed" onclick="uiNaoAtendeu()">NÃO ATENDEU</button>
    </div>

    <div id="atendeuBox"></div>
  `;
}

window.uiNaoAtendeu = async function(){
  if(!leadAtualRef) return;

  const equipe = currentUserData?.equipe || "equipe1";

  await leadAtualRef.update({
    status: "fila",
    corretorId: (leadAtualData.origem === "geral") ? currentUser.uid : null,
    emAtendimentoEm: null,
    timestampDistribuicao: null,
    timestampFinalizacao: null,
    atendeu: false,
    resultado: null,
    observacao: null,
    dataAgendada: null,
    atualizadoEm: nowMs(),
    ultimoNaoAtendeuPor: currentUser.uid,
    ultimoNaoAtendeuEm: nowMs()
  });

  await bumpStats({ uid:currentUser.uid, equipe, email:currentUser.email, tipo:"NAO_ATENDEU" });

  lastLeadId = leadAtualRef.id;
  leadAtualRef = null;
  leadAtualData = null;
  detailsOpen = false;
  toggleMode = null;

  $("leadArea").innerHTML = `<div class="center muted">Lead devolvido para a fila. Pegando outro...</div>`;
  hydrateStatsAndRank();

  setTimeout(()=>{
    window.pegarProximoLead();
  }, 350);
};

window.uiAtendeu = function(){
  if(!leadAtualRef) return;

  if(detailsOpen){
    detailsOpen = false;
    toggleMode = null;
    const box = $("atendeuBox");
    if(box) box.innerHTML = "";
    return;
  }
  detailsOpen = true;

  $("atendeuBox").innerHTML = `
    <div class="divider"></div>
    <div><b>Finalize o atendimento</b></div>
    <div class="small muted">Clique para abrir/fechar a opção e depois confirme.</div>
    <div class="divider"></div>

    <button class="btn btnGold" onclick="toggleOption('AG')">📅 AGENDAMENTO</button>
    <button class="btn btnGold" onclick="toggleOption('PR')">PROMESSA DE DOCUMENTAÇÃO</button>
    <button class="btn btnGold" onclick="toggleOption('SI')">NÃO GEROU INTERESSE</button>

    <div id="extraBox"></div>
  `;
};

window.toggleOption = function(mode){
  const extra = $("extraBox");
  if(!extra) return;

  if(toggleMode === mode){
    toggleMode = null;
    extra.innerHTML = "";
    return;
  }

  toggleMode = mode;

  if(mode === "AG"){
    extra.innerHTML = `
      <div class="divider"></div>
      <div class="small muted">Data e horário obrigatórios:</div>
      <div class="grid2">
        <input type="date" id="agData"/>
        <input type="time" id="agHora"/>
      </div>
      <div class="fieldLabel">Observações (opcional)</div>
      <textarea id="obsAg" placeholder="Ex: cliente quer apartamento 2q..."></textarea>
      <div class="grid2">
        <button class="btn btnGreen" onclick="confirmarAtendeu('AGENDAMENTO')">✔ OK</button>
        <button class="btn btnRed" onclick="cancelarExtra()">✖ Cancelar</button>
      </div>
    `;
  }

  if(mode === "PR"){
    extra.innerHTML = `
      <div class="divider"></div>
      <div class="fieldLabel">Observações (opcional)</div>
      <textarea id="obsPr" placeholder="Ex: vai enviar docs amanhã..."></textarea>
      <div class="grid2">
        <button class="btn btnGreen" onclick="confirmarAtendeu('PROMESSA DOCUMENTAÇÃO')">✔ OK</button>
        <button class="btn btnRed" onclick="cancelarExtra()">✖ Cancelar</button>
      </div>
    `;
  }

  if(mode === "SI"){
    extra.innerHTML = `
      <div class="divider"></div>
      <div class="fieldLabel">Feedback obrigatório</div>
      <textarea id="fb" placeholder="Motivo / objeção / próximo passo..."></textarea>
      <div class="grid2">
        <button class="btn btnGreen" onclick="confirmarAtendeu('NÃO GEROU INTERESSE')">✔ OK</button>
        <button class="btn btnRed" onclick="cancelarExtra()">✖ Cancelar</button>
      </div>
    `;
  }
};

window.cancelarExtra = function(){
  toggleMode = null;
  const extra = $("extraBox");
  if(extra) extra.innerHTML = "";
};

window.confirmarAtendeu = async function(resultado){
  if(!leadAtualRef) return;

  const equipe = currentUserData?.equipe || "equipe1";

  let dataAgendada = null;
  let obs = null;

  if(resultado === "AGENDAMENTO"){
    const d = $("agData")?.value || "";
    const h = $("agHora")?.value || "";
    if(!d || !h) return alert("Preencha data e horário do agendamento.");
    dataAgendada = `${d} ${h}`;
    obs = ($("obsAg")?.value || "").trim();
  }else if(resultado === "PROMESSA DOCUMENTAÇÃO"){
    obs = ($("obsPr")?.value || "").trim();
  }else{
    const fb = ($("fb")?.value || "").trim();
    if(!fb) return alert("Feedback é obrigatório.");
    obs = fb;
  }

  await leadAtualRef.update({
    status: "finalizado",
    atendeu: true,
    resultado,
    observacao: obs || null,
    dataAgendada: dataAgendada,
    timestampFinalizacao: nowMs(),
    atualizadoEm: nowMs()
  });

  if(resultado === "AGENDAMENTO"){
    await bumpStats({ uid:currentUser.uid, equipe, email:currentUser.email, tipo:"AGENDAMENTO" });
  }else if(resultado === "PROMESSA DOCUMENTAÇÃO"){
    await bumpStats({ uid:currentUser.uid, equipe, email:currentUser.email, tipo:"PROMESSA" });
  }else{
    await bumpStats({ uid:currentUser.uid, equipe, email:currentUser.email, tipo:"SEM_INTERESSE" });
  }

  leadAtualRef = null;
  leadAtualData = null;
  detailsOpen = false;
  toggleMode = null;

  $("leadArea").innerHTML = `<div class="center ok">Atendimento finalizado!</div>`;
  hydrateStatsAndRank();
};

/** =========================
 *  Relatório Excel + Email (mantido)
 *  ========================= */
window.gerarRelatorioExcel = async function(){
  const snap = await db.collection("leads").where("corretorId","==",currentUser.uid).get();
  if(snap.empty) return alert("Sem registros para relatório.");

  const today = dayKey(nowMs());

  let totalLigacoes = 0;
  let totalNaoAtendeu = 0;
  let totalAtendidos = 0;
  let totalAgend = 0;
  let totalPromessa = 0;
  let totalSemInteresse = 0;

  const atendidosRows = [];

  snap.forEach(ds=>{
    const d = ds.data();

    if(d.timestampDistribuicao && dayKey(d.timestampDistribuicao) === today){
      totalLigacoes += 1;
    }
    if(d.atendeu === false && d.timestampDistribuicao && dayKey(d.timestampDistribuicao) === today){
      totalNaoAtendeu += 1;
    }

    if(d.atendeu === true && d.timestampFinalizacao && dayKey(d.timestampFinalizacao) === today){
      totalAtendidos += 1;
      if(d.resultado === "AGENDAMENTO") totalAgend += 1;
      else if(d.resultado === "PROMESSA DOCUMENTAÇÃO") totalPromessa += 1;
      else if(d.resultado === "NÃO GEROU INTERESSE") totalSemInteresse += 1;

      const tempoMin = (d.timestampFinalizacao && d.timestampDistribuicao)
        ? Math.max(0, Math.floor((d.timestampFinalizacao - d.timestampDistribuicao)/60000))
        : "";

      atendidosRows.push({
        Cliente: d.nome || "",
        Telefone: d.telefone || "",
        Email: d.email || "",
        Resultado: d.resultado || "",
        "Data/Hora Agendada": d.dataAgendada || "",
        Feedback: d.observacao || "",
        "Tempo Atendimento (min)": tempoMin
      });
    }
  });

  const tempoLogadoMin = loginTimestamp ? Math.max(0, Math.floor((nowMs()-loginTimestamp)/60000)) : 0;

  const resumo = [
    ["Operador", currentUser.email],
    ["Equipe", currentUserData?.equipe || ""],
    ["Tempo total logado (min)", tempoLogadoMin],
    ["Total de ligações (tentativas)", totalLigacoes],
    ["Total NÃO atendeu", totalNaoAtendeu],
    ["Total ATENDIDOS", totalAtendidos],
    ["Agendamentos", totalAgend],
    ["Promessa documentação", totalPromessa],
    ["Não gerou interesse", totalSemInteresse],
    ["Data", today]
  ];

  const wsResumo = XLSX.utils.aoa_to_sheet(resumo);
  const wsAtend  = XLSX.utils.json_to_sheet(atendidosRows);

  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, wsResumo, "Resumo");
  XLSX.utils.book_append_sheet(wb, wsAtend, "Atendidos");

  XLSX.writeFile(wb, `PROEFI_RELATORIO_${today}.xlsx`);
  alert("Relatório Excel gerado (baixado no dispositivo).");
};

window.prepararEmailRelatorio = async function(){
  const equipe = currentUserData?.equipe || "equipe1";
  const gsnap = await db.collection("users")
    .where("role","==","gerente")
    .where("equipe","==",equipe)
    .limit(1)
    .get();

  if(gsnap.empty){
    alert("Nenhum gerente encontrado para sua equipe. Peça para o gerente salvar 'emailRelatorio'.");
    return;
  }
  const gerente = gsnap.docs[0].data();
  const to = gerente.emailRelatorio || gerente.email || "";
  if(!to){
    alert("Gerente sem emailRelatorio configurado.");
    return;
  }

  const today = dayKey(nowMs());
  const subject = encodeURIComponent(`PROEFI - ALVENA | Relatório do Operador | ${today}`);
  const body = encodeURIComponent(
`Olá, gerente.

Segue o relatório do operador:
Operador: ${currentUser.email}
Equipe: ${equipe}
Data: ${today}

(Anexo: arquivo Excel gerado no PROEFI)

Att,
PROEFI - ALVENA`
  );

  window.location.href = `mailto:${encodeURIComponent(to)}?subject=${subject}&body=${body}`;
};

/** =========================
 *  Stats hydration
 *  ========================= */
async function hydrateStatsAndRank(){
  if(!currentUser || !currentUserData) return;

  if(loginTimestamp && $("tempoLogado")){
    const min = Math.max(0, Math.floor((nowMs() - loginTimestamp)/60000));
    $("tempoLogado").innerText = String(min);
  }

  const stats = await loadMyStats();
  const htmlStats = stats ? `
    <div>📞 Ligações: <b>${stats.ligacoes||0}</b></div>
    <div>🔴 Não atendeu: <b>${stats.naoAtendeu||0}</b></div>
    <div>🟢 Atendidos: <b>${stats.atendidos||0}</b></div>
    <div>📅 Agendamentos: <b>${stats.agendamentos||0}</b></div>
    <div>📂 Promessas: <b>${stats.promessas||0}</b></div>
    <div>❌ Sem interesse: <b>${stats.semInteresse||0}</b></div>
  ` : `<div class="muted">Sem dados de hoje ainda.</div>`;

  if($("statsBox")) $("statsBox").innerHTML = htmlStats;
  if($("statsBox2")) $("statsBox2").innerHTML = htmlStats;

  if($("rankHoje")){
    const r = await computeRankingEquipeForCorretor();
    $("rankHoje").innerText = (r.pos === "-" ? "--" : `${r.pos}º de ${r.total}`);
  }
}

setInterval(()=>{
  if(loginTimestamp && $("tempoLogado")){
    const min = Math.max(0, Math.floor((nowMs() - loginTimestamp)/60000));
    $("tempoLogado").innerText = String(min);
  }
}, 5000);

/** =========================
 *  Bootstrap
 *  ========================= */
auth.onAuthStateChanged(async (user)=>{
  if(!user){
    currentUser = null;
    currentUserData = null;
    renderLogin();
    return;
  }

  const userSnap = await db.collection("users").doc(user.uid).get();
  if(!userSnap.exists){
    renderUnauthorized();
    return;
  }

  currentUser = user;
  currentUserData = userSnap.data();

  // pendente
  if(currentUserData.role === "pendente" || currentUserData.aprovado !== true){
    renderPending(user, currentUserData);
    return;
  }

  if(currentUserData.role === "diretor"){
    renderDiretor(user, currentUserData);
    return;
  }
  if(currentUserData.role === "gerente"){
    renderGerente(user, currentUserData);
    return;
  }

  // corretor
  loginTimestamp = nowMs();
  currentTab = "painel";
  renderCorretorShell(user, currentUserData);
});
</script>
